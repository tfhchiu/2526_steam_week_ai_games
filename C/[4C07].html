<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字節戰警：代碼防衛戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+TC:wght@500;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050a15; /* 賽博龐克深藍背景 */
            font-family: 'Noto Sans TC', sans-serif;
            user-select: none;
            color: white;
        }

        /* 網格背景特效 */
        #bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) scale(3);
            animation: gridMove 5s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI 覆蓋層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hud-top {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* 目標單字顯示區 */
        .target-word-container {
            background: rgba(10, 20, 40, 0.8);
            border: 2px solid #0ff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.2);
            padding: 15px 40px;
            border-radius: 8px;
            text-align: center;
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .tech-font {
            font-family: 'Share Tech Mono', monospace;
        }

        /* 模態框 (開始/結束畫面) */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 10, 25, 0.95);
            border: 2px solid #f0f;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            pointer-events: auto;
            z-index: 50;
            width: 90%;
            max-width: 500px;
            transition: opacity 0.3s;
        }

        .hidden {
            display: none !important;
            opacity: 0;
        }

        button.cyber-btn {
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        button.cyber-btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px #0ff;
        }

        /* 畫面震動特效 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-screen {
            animation: shake 0.4s;
        }

        /* 血量條 */
        .hp-bar {
            width: 20px;
            height: 20px;
            transform: rotate(45deg);
            background-color: #f0f;
            box-shadow: 0 0 10px #f0f;
            margin: 0 5px;
            transition: all 0.3s;
        }
        .hp-empty {
            background-color: transparent;
            border: 2px solid #333;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- 賽博龐克背景網格 -->
    <div id="bg-grid"></div>

    <!-- 遊戲畫布 -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI 層 -->
    <div id="ui-layer">
        <div class="hud-top">
            <!-- 分數 -->
            <div>
                <div class="text-cyan-400 text-sm font-bold tracking-widest tech-font">SCORE_DATA</div>
                <div id="scoreEl" class="text-white text-3xl font-black tech-font tabular-nums drop-shadow-[0_0_8px_rgba(0,255,255,0.8)]">0</div>
            </div>
            
            <!-- 血量 -->
            <div class="text-right">
                <div class="text-pink-500 text-sm font-bold tracking-widest tech-font mb-2">SYSTEM_INTEGRITY</div>
                <div class="flex" id="hpEl">
                    <!-- 血量由 JS 生成 -->
                </div>
            </div>
        </div>

        <!-- 螢幕正上方的目標單字 -->
        <div id="targetWordUI" class="target-word-container hidden">
            <div class="text-cyan-400 text-xs tracking-widest mb-1 tech-font">TARGET_WORD</div>
            <div id="targetEn" class="text-4xl font-black text-white tech-font tracking-wider">KEYBOARD</div>
        </div>
    </div>

    <!-- 開始畫面 -->
    <div id="startModal" class="modal">
        <h1 class="text-4xl md:text-5xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500 drop-shadow-[0_0_10px_rgba(255,0,255,0.5)]">
            字節戰警
        </h1>
        <p class="text-xl text-cyan-200 mb-6 tracking-widest font-bold">代碼防衛戰</p>
        
        <div class="text-left bg-black/50 p-5 rounded border border-cyan-800 mb-6 text-sm text-gray-300 leading-relaxed">
            <p class="mb-2"><span class="text-cyan-400 font-bold"><i class="fas fa-crosshairs"></i> 任務目標：</span></p>
            <ul class="list-disc pl-5 mb-4 space-y-1">
                <li>系統會顯示一個 <strong class="text-white">英文單字</strong> 作為目標。</li>
                <li>四周會出現帶有 <strong class="text-white">中文翻譯</strong> 的病毒。</li>
                <li>請精準射擊帶有 <strong class="text-green-400">正確翻譯</strong> 的病毒！</li>
                <li>射錯病毒或被病毒撞擊，將損失系統完整度 (HP)。</li>
            </ul>
            <p><span class="text-pink-400 font-bold"><i class="fas fa-keyboard"></i> 操作：</span> WASD/方向鍵移動，滑鼠瞄準與左鍵射擊。</p>
        </div>

        <button id="startBtn" class="cyber-btn">INITIALIZE</button>
    </div>

    <!-- 遊戲結束畫面 -->
    <div id="gameOverModal" class="modal hidden">
        <h1 class="text-5xl font-black mb-2 text-pink-500 drop-shadow-[0_0_15px_rgba(255,0,0,0.8)]">SYSTEM FAILURE</h1>
        <p class="text-xl text-gray-300 mb-2 tech-font">FINAL_SCORE</p>
        <p id="finalScore" class="text-6xl font-black text-cyan-400 mb-8 tech-font tabular-nums">0</p>
        
        <div class="bg-black/50 p-4 rounded border border-pink-800 mb-6 text-sm text-gray-300">
            <p>要成為頂尖駭客，還需要多背一點單字喔！</p>
        </div>

        <button id="restartBtn" class="cyber-btn">REBOOT SYSTEM</button>
    </div>

    <script>
        // 電腦單字庫 (初中程度)
        const vocabDB = [
            { en: "Hardware", zh: "硬體" }, { en: "Software", zh: "軟體" },
            { en: "Keyboard", zh: "鍵盤" }, { en: "Monitor", zh: "顯示器" },
            { en: "Mouse", zh: "滑鼠" }, { en: "Network", zh: "網路" },
            { en: "Database", zh: "資料庫" }, { en: "Browser", zh: "瀏覽器" },
            { en: "Password", zh: "密碼" }, { en: "Server", zh: "伺服器" },
            { en: "Virus", zh: "病毒" }, { en: "Download", zh: "下載" },
            { en: "Upload", zh: "上傳" }, { en: "File", zh: "檔案" },
            { en: "Folder", zh: "資料夾" }, { en: "Memory", zh: "記憶體" },
            { en: "Motherboard", zh: "主機板" }, { en: "Algorithm", zh: "演算法" },
            { en: "Hacker", zh: "駭客" }, { en: "Firewall", zh: "防火牆" }
        ];

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI 元素
        const scoreEl = document.getElementById('scoreEl');
        const hpEl = document.getElementById('hpEl');
        const startModal = document.getElementById('startModal');
        const gameOverModal = document.getElementById('gameOverModal');
        const targetWordUI = document.getElementById('targetWordUI');
        const targetEnEl = document.getElementById('targetEn');
        
        // 設定畫布尺寸
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 遊戲狀態變數
        let animationId;
        let score = 0;
        let gameActive = false;
        let currentTarget = null; // 當前的目標單字物件
        let wordQueue = []; // 用來確保單字不重複

        // 玩家輸入狀態
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
        const mouse = { x: canvas.width / 2, y: canvas.height / 2, isDown: false };

        // 監聽鍵盤與滑鼠
        window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mousedown', () => mouse.isDown = true);
        window.addEventListener('mouseup', () => mouse.isDown = false);
        window.addEventListener('touchstart', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; mouse.isDown = true; }, {passive: false});
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; }, {passive: false});
        window.addEventListener('touchend', () => mouse.isDown = false);

        // 洗牌演算法
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // 實體類別定義
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 16;
                this.color = '#0ff'; // 青色
                this.speed = 5;
                this.maxHp = 5;
                this.hp = 5;
                this.angle = 0;
                this.fireRate = 12; // 射速
                this.fireCooldown = 0;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // 畫無人機本體 (三角形/箭頭感)
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-15, 15);
                ctx.lineTo(-10, 0);
                ctx.lineTo(-15, -15);
                ctx.closePath();
                
                ctx.fillStyle = 'rgba(0, 255, 255, 0.2)';
                ctx.fill();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.stroke();

                // 核心發光點
                ctx.beginPath();
                ctx.arc(-5, 0, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();

                ctx.restore();
            }

            update() {
                this.angle = Math.atan2(mouse.y - this.y, mouse.x - this.x);

                let dx = 0, dy = 0;
                if (keys.w || keys.ArrowUp) dy -= this.speed;
                if (keys.s || keys.ArrowDown) dy += this.speed;
                if (keys.a || keys.ArrowLeft) dx -= this.speed;
                if (keys.d || keys.ArrowRight) dx += this.speed;

                if (dx !== 0 && dy !== 0) {
                    const length = Math.sqrt(dx*dx + dy*dy);
                    dx = (dx / length) * this.speed;
                    dy = (dy / length) * this.speed;
                }

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x + dx));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y + dy));

                if (this.fireCooldown > 0) this.fireCooldown--;
                if (mouse.isDown && this.fireCooldown === 0) {
                    this.shoot();
                    this.fireCooldown = this.fireRate;
                }

                this.draw();
            }

            shoot() {
                const barrelX = this.x + Math.cos(this.angle) * 20;
                const barrelY = this.y + Math.sin(this.angle) * 20;
                const velocity = { x: Math.cos(this.angle) * 15, y: Math.sin(this.angle) * 15 };
                
                projectiles.push(new Projectile(barrelX, barrelY, 4, '#0ff', velocity));
            }

            updateHPUI() {
                hpEl.innerHTML = '';
                for(let i=0; i<this.maxHp; i++) {
                    const div = document.createElement('div');
                    div.className = `hp-bar ${i < this.hp ? '' : 'hp-empty'}`;
                    hpEl.appendChild(div);
                }
            }

            takeDamage() {
                this.hp--;
                this.updateHPUI();
                createExplosion(this.x, this.y, '#f0f', 20);
                
                // 畫面震動
                document.body.classList.add('shake-screen');
                setTimeout(() => document.body.classList.remove('shake-screen'), 400);

                if (this.hp <= 0) {
                    endGame();
                }
            }
        }

        class Projectile {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                
                // 子彈尾跡
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.velocity.x * 2, this.y - this.velocity.y * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.draw();
            }
        }

        // 單字敵人 (帶有文字的方塊)
        class WordEnemy {
            constructor(x, y, wordObj, isCorrect) {
                this.x = x;
                this.y = y;
                this.wordObj = wordObj; // {en, zh}
                this.isCorrect = isCorrect;
                
                this.width = 80;
                this.height = 40;
                // 依據字數動態調整寬度
                if (this.wordObj.zh.length > 3) this.width = 100;
                
                this.color = '#ff3366'; // 預設紅色系 (病毒感)
                this.speed = 0.8 + Math.random() * 0.5; // 緩慢逼近
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // 畫外框 (六邊形或切角矩形風格)
                ctx.beginPath();
                ctx.moveTo(-this.width/2 + 10, -this.height/2);
                ctx.lineTo(this.width/2, -this.height/2);
                ctx.lineTo(this.width/2, this.height/2 - 10);
                ctx.lineTo(this.width/2 - 10, this.height/2);
                ctx.lineTo(-this.width/2, this.height/2);
                ctx.lineTo(-this.width/2, -this.height/2 + 10);
                ctx.closePath();
                
                ctx.fillStyle = 'rgba(20, 0, 20, 0.8)';
                ctx.fill();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.stroke();

                // 畫文字
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px "Noto Sans TC"';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 0; // 文字不需要外發光，以免糊掉
                ctx.fillText(this.wordObj.zh, 0, 2); // 微調垂直位置

                ctx.restore();
            }

            update() {
                // 追蹤玩家
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
                this.draw();
            }
        }

        class Particle {
            constructor(x, y, radius, color, velocity) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.color = color;
                this.velocity = velocity;
                this.alpha = 1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.velocity.x *= 0.95; // 摩擦力
                this.velocity.y *= 0.95;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.02;
                this.draw();
            }
        }

        class FloatingText {
            constructor(x, y, text, color) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.alpha = 1;
                this.velocity = { x: (Math.random()-0.5)*2, y: -2 - Math.random() };
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.font = 'bold 24px "Share Tech Mono"';
                ctx.textAlign = 'center';
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillText(this.text, this.x, this.y);
                ctx.restore();
            }
            update() {
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.015;
                this.draw();
            }
        }

        // 遊戲陣列
        let player;
        let projectiles = [];
        let enemies = [];
        let particles = [];
        let floatingTexts = [];

        function initGame() {
            player = new Player(canvas.width / 2, canvas.height / 2);
            projectiles = [];
            enemies = [];
            particles = [];
            floatingTexts = [];
            score = 0;
            scoreEl.innerHTML = score;
            player.updateHPUI();
            
            // 初始化題庫
            wordQueue = shuffle([...vocabDB]);
            
            startModal.classList.add('hidden');
            gameOverModal.classList.add('hidden');
            targetWordUI.classList.remove('hidden');
            gameActive = true;
            
            nextWave();
            animate();
        }

        // 產生新的一波題目
        function nextWave() {
            enemies = []; // 清空場上敵人
            projectiles = []; // 清空子彈避免誤擊

            if (wordQueue.length === 0) {
                wordQueue = shuffle([...vocabDB]); // 無限循環
            }

            currentTarget = wordQueue.pop();
            targetEnEl.innerHTML = currentTarget.en;

            // 挑選錯誤選項 (3個)
            let wrongOptions = vocabDB.filter(w => w.en !== currentTarget.en);
            wrongOptions = shuffle(wrongOptions).slice(0, 3);

            // 組合所有選項並洗牌
            let options = [{ word: currentTarget, isCorrect: true }];
            wrongOptions.forEach(w => options.push({ word: w, isCorrect: false }));
            options = shuffle(options);

            // 在畫面邊緣生成這些敵人
            options.forEach((opt, index) => {
                let x, y;
                // 分配到四個角落附近
                const padding = 100;
                if (index === 0) { x = padding; y = padding; }
                else if (index === 1) { x = canvas.width - padding; y = padding; }
                else if (index === 2) { x = padding; y = canvas.height - padding; }
                else { x = canvas.width - padding; y = canvas.height - padding; }

                // 稍微加入隨機偏移，避免太規律
                x += (Math.random() - 0.5) * 50;
                y += (Math.random() - 0.5) * 50;

                enemies.push(new WordEnemy(x, y, opt.word, opt.isCorrect));
            });
        }

        function createExplosion(x, y, color, amount = 15) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(
                    x, y,
                    Math.random() * 3 + 1,
                    color,
                    { x: (Math.random() - 0.5) * 10, y: (Math.random() - 0.5) * 10 }
                ));
            }
        }

        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);

            // 清空畫布 (帶點透明度產生殘影)
            ctx.fillStyle = 'rgba(5, 10, 21, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            player.update();

            // 處理浮動文字
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
                else ft.update();
            }

            // 處理粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                if (particle.alpha <= 0) particles.splice(i, 1);
                else particle.update();
            }

            // 處理子彈
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const projectile = projectiles[i];
                projectile.update();

                if (projectile.x < 0 || projectile.x > canvas.width || 
                    projectile.y < 0 || projectile.y > canvas.height) {
                    projectiles.splice(i, 1);
                }
            }

            // 處理敵人與碰撞
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                enemy.update();

                // 敵人撞擊玩家 (矩形碰撞簡化為圓形檢測)
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer < player.radius + Math.max(enemy.width, enemy.height)/2 - 10) {
                    // 撞到玩家
                    player.takeDamage();
                    floatingTexts.push(new FloatingText(enemy.x, enemy.y, "CRASH!", "#f0f"));
                    
                    if(enemy.isCorrect) {
                        // 如果剛好是正確的撞上來，也要換題，但不給分
                        setTimeout(nextWave, 500);
                    } else {
                        // 錯誤的撞上來，把它移除
                        enemies.splice(i, 1);
                    }
                    continue; 
                }

                // 子彈擊中敵人 (AABB碰撞)
                for (let j = projectiles.length - 1; j >= 0; j--) {
                    const p = projectiles[j];
                    
                    if (p.x > enemy.x - enemy.width/2 && p.x < enemy.x + enemy.width/2 &&
                        p.y > enemy.y - enemy.height/2 && p.y < enemy.y + enemy.height/2) {
                        
                        projectiles.splice(j, 1); // 移除子彈

                        if (enemy.isCorrect) {
                            // 答對了！
                            score += 100;
                            scoreEl.innerHTML = score;
                            createExplosion(enemy.x, enemy.y, '#0f0', 30); // 綠色爆炸
                            floatingTexts.push(new FloatingText(enemy.x, enemy.y, "ACCESS GRANTED +100", "#0f0"));
                            
                            // 進入下一題
                            setTimeout(nextWave, 300);
                            
                            // 移除所有目前的敵人 (避免動畫期間繼續碰撞)
                            enemies = []; 
                            break; 
                        } else {
                            // 答錯了！
                            player.takeDamage();
                            createExplosion(enemy.x, enemy.y, '#f00', 20); // 紅色爆炸
                            floatingTexts.push(new FloatingText(enemy.x, enemy.y, "ACCESS DENIED!", "#f00"));
                            
                            enemies.splice(i, 1); // 移除這個錯誤選項
                            break;
                        }
                    }
                }
            }
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            targetWordUI.classList.add('hidden');
            document.getElementById('finalScore').innerHTML = score;
            gameOverModal.classList.remove('hidden');
        }

        // 綁定按鈕事件
        document.getElementById('startBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', initGame);

    </script>
</body>
