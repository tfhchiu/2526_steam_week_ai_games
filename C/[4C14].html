<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布丁狗電腦生字挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入煙火特效庫 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            /* 布丁狗溫暖黃背景 */
            background-color: #fffbeb; /* amber-50 */
            background-image: radial-gradient(#fde68a 3px, transparent 3px); /* amber-200 */
            background-size: 30px 30px;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* 布丁狗風格卡片 */
        .pudding-card {
            background-color: #ffffff;
            border: 6px solid #78350f; /* amber-900 (布丁狗的帽子顏色) */
            border-radius: 2rem;
            box-shadow: 10px 10px 0px #f59e0b; /* amber-500 */
            position: relative;
            overflow: hidden;
        }

        /* 布丁狗風格按鈕：深棕色底 */
        .btn-pudding {
            background-color: #78350f;
            color: #fde68a;
            border: 4px solid #78350f;
            box-shadow: 6px 6px 0px #f59e0b;
            transition: all 0.15s ease-in-out;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-pudding:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0px #f59e0b;
            background-color: #92400e;
        }
        .btn-pudding:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #f59e0b;
        }

        /* 布丁狗風格按鈕：亮黃色底 */
        .btn-pudding-yellow {
            background-color: #fbbf24; 
            color: #78350f;
            box-shadow: 6px 6px 0px #78350f;
        }
        .btn-pudding-yellow:hover {
            box-shadow: 8px 8px 0px #78350f;
            background-color: #fcd34d;
        }
        .btn-pudding-yellow:active {
            box-shadow: 0px 0px 0px #78350f;
        }

        /* 浮動動畫 */
        @keyframes float-cute {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg) scale(1.05); }
        }
        .floating-emoji {
            animation: float-cute 2.5s ease-in-out infinite;
            filter: drop-shadow(0 5px 5px rgba(120,53,15,0.2));
            display: inline-block;
        }

        /* 錯誤震動 */
        @keyframes shake-hard {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-12px) rotate(-5deg); }
            30% { transform: translateX(12px) rotate(5deg); }
            45% { transform: translateX(-12px) rotate(-5deg); }
            60% { transform: translateX(12px) rotate(5deg); }
            75% { transform: translateX(-6px) rotate(-2deg); }
        }
        .shake-hard {
            animation: shake-hard 0.4s ease-in-out;
            border-color: #ef4444 !important; 
            background-color: #fee2e2 !important; 
            color: #ef4444 !important;
        }

        /* 輸入框樣式 */
        input:focus { 
            outline: none; 
            border-color: #f59e0b;
            box-shadow: inset 0 0 0 2px #f59e0b;
        }

        /* 自訂滾動條 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fef3c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- 主遊戲容器 -->
    <div id="game-container" class="pudding-card w-full max-w-md p-8 relative">
        
        <!-- 畫面 1: 開始畫面 -->
        <div id="start-screen" class="text-center flex flex-col items-center justify-center space-y-6">
            <div class="text-7xl floating-emoji mb-2">🍮🐶</div>
            <h1 class="text-3xl font-black text-amber-900 tracking-wider">布丁狗：電腦生字</h1>
            
            <div class="space-y-3 text-sm text-amber-900 bg-amber-50 p-5 rounded-2xl w-full text-left border-4 border-amber-900 shadow-inner">
                <p class="text-amber-900 text-center text-lg font-black mb-2 border-b-2 border-amber-900 pb-2">📜 遊戲規則 📜</p>
                <p class="flex items-start"><span class="mr-2">⏱️</span> 每一道題的時間為 <span class="font-bold text-red-600 mx-1">1分鐘 (60秒)</span>。</p>
                <p class="flex items-start"><span class="mr-2">🍮</span> 根據提示輸入電腦名詞 (繁體、簡體、英文皆可)。</p>
                <p class="flex items-start font-black text-red-600"><span class="mr-2">⚠️</span> 刺激挑戰：只要輸入「錯誤答案」，時間立刻停止並判定失敗！</p>
                <p class="flex items-start"><span class="mr-2">🏆</span> 擠進史上最快前三名，將會有專屬煙火慶祝！</p>
            </div>

            <button onclick="showNameScreen()" class="btn-pudding mt-4 w-full font-black text-2xl py-4 rounded-xl">
                START 開始遊戲 ➔
            </button>
        </div>

        <!-- 畫面 1.5: 名字輸入畫面 -->
        <div id="name-screen" class="hidden text-center flex flex-col items-center justify-center space-y-6">
            <div class="text-7xl floating-emoji mb-2">🐾</div>
            <h2 class="text-2xl font-black text-amber-900">哈囉！你叫什麼名字？</h2>
            
            <div class="w-full relative mt-2">
                <input type="text" id="player-name-input" placeholder="✏️ 輸入你的暱稱..." autocomplete="off"
                    class="w-full bg-amber-50 border-4 border-amber-900 text-amber-900 font-black text-xl rounded-xl px-6 py-4 transition-colors text-center placeholder-amber-400"
                    onkeypress="handleNameKeyPress(event)">
                <p id="name-error" class="text-red-500 font-bold mt-2 hidden">名字不能是空白的唷！🐶</p>
            </div>

            <button onclick="submitNameAndStart()" class="btn-pudding btn-pudding-yellow mt-4 w-full font-black text-2xl py-4 rounded-xl">
                Go! 進入遊戲 🚀
            </button>
        </div>

        <!-- 畫面 2: 遊戲進行中畫面 -->
        <div id="play-screen" class="hidden flex flex-col h-full">
            <!-- 頂部狀態列 -->
            <div class="flex justify-between items-center mb-6">
                <div class="text-amber-100 font-bold bg-amber-900 px-4 py-2 rounded-xl border-2 border-amber-900 flex items-center shadow-sm">
                    第 <span id="question-number" class="mx-1 text-lg font-black text-amber-300">1</span> / <span id="total-questions" class="ml-1">5</span> 題
                </div>
                <div class="flex items-center space-x-2 bg-amber-100 px-4 py-2 rounded-xl border-2 border-amber-900 shadow-sm">
                    <span class="text-xl animate-pulse">⏳</span>
                    <span id="timer-text" class="font-black text-2xl text-amber-900 w-8 text-center">60</span>
                </div>
            </div>

            <!-- 時間進度條 -->
            <div class="w-full bg-amber-200 border-2 border-amber-900 rounded-full h-4 mb-8 p-0.5">
                <div id="timer-bar" class="bg-amber-500 h-full rounded-full transition-all duration-1000 ease-linear" style="width: 100%"></div>
            </div>

            <!-- 題目區 -->
            <div class="flex-grow flex flex-col items-center text-center bg-white p-6 rounded-2xl border-4 border-amber-900 relative">
                <div id="question-emoji" class="text-6xl mb-4 floating-emoji absolute -top-10 bg-white rounded-full p-2 border-4 border-amber-900">🐶</div>
                
                <h2 class="text-amber-700 font-black mb-3 mt-6 bg-amber-50 px-4 py-1 rounded-full text-sm border-2 border-amber-200">翻譯或輸入這個名詞</h2>
                
                <p id="question-hint" class="text-4xl font-black text-amber-900 mb-6 tracking-wider">
                    載入中
                </p>

                <!-- 輸入區 -->
                <div class="w-full relative mt-2">
                    <input type="text" id="answer-input" placeholder="✏️ 輸入答案..." autocomplete="off"
                        class="w-full bg-amber-50 border-4 border-amber-900 text-amber-900 font-black text-xl rounded-xl px-6 py-4 transition-colors text-center placeholder-amber-400"
                        onkeypress="handleKeyPress(event)">
                </div>
                
                <button onclick="checkAnswer()" class="btn-pudding btn-pudding-yellow mt-6 w-full font-black text-xl py-3 rounded-xl">
                    📤 送出 (Enter)
                </button>
            </div>
        </div>

        <!-- 畫面 3: 結果畫面 (單題) -->
        <div id="result-screen" class="hidden text-center flex flex-col items-center justify-center space-y-6 py-4">
            <div id="result-emoji" class="text-8xl floating-emoji">✨</div>
            <h2 id="result-title" class="text-4xl font-black text-amber-900">太厲害了！</h2>
            
            <div id="result-message-box" class="bg-white w-full p-6 rounded-2xl border-4 border-amber-900">
                <p id="result-message" class="text-xl text-amber-800 font-bold mb-2">成功在時間內完成！</p>
                
                <!-- 失敗時顯示答案的區塊 -->
                <div id="correct-answer-box" class="hidden mt-4 pt-4 border-t-4 border-amber-900 border-dashed">
                    <p class="text-sm text-amber-600 font-black mb-2 flex items-center justify-center">🐾 這題的正確答案是 🐾</p>
                    <p id="correct-answer-text" class="text-2xl font-black text-amber-600 tracking-wider bg-amber-50 inline-block px-4 py-2 rounded-xl border-2 border-amber-200"></p>
                </div>
            </div>

            <button onclick="nextQuestion()" id="next-btn" class="btn-pudding w-full font-black text-2xl py-4 rounded-xl mt-4">
                下一題 ➔
            </button>
        </div>

        <!-- 畫面 4: 最終結算畫面 -->
        <div id="final-screen" class="hidden text-center flex flex-col items-center justify-center space-y-4">
            <div class="text-7xl floating-emoji mb-2">🏆🍮</div>
            <h2 class="text-3xl font-black text-amber-400 bg-amber-900 px-6 py-2 rounded-xl border-2 border-amber-400">挑戰結束！</h2>
            
            <div class="bg-white w-full p-4 rounded-2xl border-4 border-amber-900 flex justify-around items-center">
                <div class="text-center">
                    <p class="text-amber-600 font-bold text-sm mb-1">玩家</p>
                    <p class="text-xl font-black text-amber-900 truncate w-24" id="final-player-name">Name</p>
                </div>
                <div class="w-1 h-10 bg-amber-900 rounded-full"></div>
                <div class="text-center">
                    <p class="text-amber-600 font-bold text-sm mb-1">得分</p>
                    <p class="text-3xl font-black text-amber-500"><span id="final-score">0</span></p>
                </div>
                <div class="w-1 h-10 bg-amber-900 rounded-full"></div>
                <div class="text-center">
                    <p class="text-amber-600 font-bold text-sm mb-1">耗時</p>
                    <p class="text-2xl font-black text-amber-900"><span id="final-time">0</span><span class="text-sm text-amber-500">s</span></p>
                </div>
            </div>
            
            <!-- 排行榜與煙火訊息 -->
            <div class="bg-amber-100 rounded-xl p-3 w-full border-2 border-amber-900 text-center">
                <p id="final-message" class="text-lg font-black text-amber-900"></p>
            </div>

            <!-- 排行榜區塊 -->
            <div class="w-full bg-white rounded-xl p-3 border-4 border-amber-900 text-left h-48 overflow-y-auto">
                <h3 class="text-md font-black text-amber-600 mb-2 text-center border-b-2 border-amber-100 pb-2 sticky top-0 bg-white">
                    🍮 布丁狗達人排行榜 🍮
                </h3>
                <ul id="leaderboard-list" class="text-sm space-y-2 font-bold">
                    <!-- 動態生成排行榜 -->
                </ul>
            </div>

            <button onclick="resetGame()" class="btn-pudding btn-pudding-yellow w-full font-black text-xl py-3 rounded-xl mt-2">
                ↺ 再挑戰一次
            </button>
        </div>

    </div>

    <script>
        // 總題庫設定：初中生常見的電腦名詞 (繁簡英皆可)
        const allQuestions = [
            { hint: "CPU", answer: "中央處理器", acceptedAnswers: ["cpu", "中央處理器", "中央处理器"], emoji: "🧠" },
            { hint: "Keyboard", answer: "鍵盤", acceptedAnswers: ["keyboard", "鍵盤", "键盘"], emoji: "⌨️" },
            { hint: "Mouse", answer: "滑鼠", acceptedAnswers: ["mouse", "滑鼠", "鼠标"], emoji: "🖱️" },
            { hint: "Monitor", answer: "螢幕", acceptedAnswers: ["monitor", "screen", "螢幕", "屏幕", "顯示器", "显示器"], emoji: "🖥️" },
            { hint: "Hard Drive", answer: "硬碟", acceptedAnswers: ["hard drive", "hdd", "ssd", "硬碟", "硬盘"], emoji: "🗄️" },
            { hint: "Motherboard", answer: "主機板", acceptedAnswers: ["motherboard", "主機板", "主板"], emoji: "🧩" },
            { hint: "Internet", answer: "網際網路", acceptedAnswers: ["internet", "網際網路", "网际网路", "網路", "网络", "互聯網", "互联网"], emoji: "🌐" },
            { hint: "Software", answer: "軟體", acceptedAnswers: ["software", "軟體", "软件", "程式", "程序"], emoji: "💾" },
            { hint: "Hardware", answer: "硬體", acceptedAnswers: ["hardware", "硬體", "硬件"], emoji: "⚙️" },
            { hint: "Browser", answer: "瀏覽器", acceptedAnswers: ["browser", "瀏覽器", "浏览器"], emoji: "🌍" },
            { hint: "Password", answer: "密碼", acceptedAnswers: ["password", "密碼", "密码"], emoji: "🔑" },
            { hint: "Database", answer: "資料庫", acceptedAnswers: ["database", "資料庫", "数据库"], emoji: "🗃️" },
            { hint: "File", answer: "檔案", acceptedAnswers: ["file", "檔案", "档案", "文件"], emoji: "📄" },
            { hint: "Folder", answer: "資料夾", acceptedAnswers: ["folder", "資料夾", "资料夹", "文件夹"], emoji: "📁" },
            { hint: "Download", answer: "下載", acceptedAnswers: ["download", "下載", "下载"], emoji: "⬇️" }
        ];

        // 遊戲狀態變數
        let playerName = "";
        let questions = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let gameTotalTime = 0; 
        const TIME_LIMIT = 60; // 每一道題的時間為1分鐘

        const screens = {
            start: document.getElementById('start-screen'),
            name: document.getElementById('name-screen'),
            play: document.getElementById('play-screen'),
            result: document.getElementById('result-screen'),
            final: document.getElementById('final-screen')
        };
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');
        const answerInput = document.getElementById('answer-input');
        const nameInput = document.getElementById('player-name-input');

        // 洗牌演算法：確保題目不重複
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // 顯示名字輸入畫面
        function showNameScreen() {
            switchScreen('name');
            nameInput.value = '';
            document.getElementById('name-error').classList.add('hidden');
            setTimeout(() => nameInput.focus(), 100);
        }

        function handleNameKeyPress(event) {
            if (event.key === 'Enter') submitNameAndStart();
        }

        // 提交名字並開始遊戲
        function submitNameAndStart() {
            const name = nameInput.value.trim();
            if (!name) {
                document.getElementById('name-error').classList.remove('hidden');
                nameInput.classList.add('shake-hard');
                setTimeout(() => nameInput.classList.remove('shake-hard'), 400);
                return;
            }
            
            playerName = name;
            
            // 從總題庫隨機抽取 5 題 (不重複)
            const shuffledPool = [...allQuestions];
            shuffleArray(shuffledPool);
            questions = shuffledPool.slice(0, 5);

            currentQuestionIndex = 0;
            score = 0;
            gameTotalTime = 0;
            document.getElementById('total-questions').innerText = questions.length;
            
            switchScreen('play');
            loadQuestion();
        }

        // 載入題目並立刻開始計時
        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('question-number').innerText = currentQuestionIndex + 1;
            document.getElementById('question-hint').innerText = q.hint;
            document.getElementById('question-emoji').innerText = q.emoji;
            
            answerInput.value = '';
            answerInput.classList.remove('shake-hard');
            answerInput.disabled = false;
            answerInput.focus();

            // 設定1分鐘並啟動計時器
            timeLeft = TIME_LIMIT;
            updateTimerUI();
            clearInterval(timerInterval);
            timerInterval = setInterval(timerTick, 1000);
        }

        function timerTick() {
            timeLeft--;
            updateTimerUI();

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                handleLose('timeout'); // 一分鐘內沒有完成就算輸
            }
        }

        function updateTimerUI() {
            timerText.innerText = timeLeft;
            const percentage = (timeLeft / TIME_LIMIT) * 100;
            timerBar.style.width = percentage + '%';

            if (timeLeft > 15) {
                timerBar.className = "bg-amber-500 h-full rounded-full transition-all duration-1000 ease-linear";
                timerText.className = "font-black text-2xl text-amber-900 w-8 text-center";
            } else {
                timerBar.className = "bg-red-500 h-full rounded-full transition-all duration-1000 ease-linear animate-pulse";
                timerText.className = "font-black text-2xl text-red-600 w-8 text-center animate-pulse";
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') checkAnswer();
        }

        // 檢查答案邏輯
        function checkAnswer() {
            if (answerInput.disabled) return;
            const userAnswer = answerInput.value.trim().toLowerCase();
            if (!userAnswer) return;

            const currentQ = questions[currentQuestionIndex];
            const isCorrect = currentQ.acceptedAnswers.some(ans => ans.toLowerCase() === userAnswer);

            if (isCorrect) {
                // 答對，在一分鐘內完成算贏
                clearInterval(timerInterval); 
                score += 10; 
                handleWin();
            } else {
                // ！！！關鍵規則：輸入錯誤立刻停止時間，判定輸！！！
                clearInterval(timerInterval);
                answerInput.disabled = true; 
                answerInput.classList.add('shake-hard'); 
                
                setTimeout(() => {
                    handleLose('wrong');
                }, 500);
            }
        }

        function handleWin() {
            switchScreen('result');
            const timeUsed = TIME_LIMIT - timeLeft;
            gameTotalTime += timeUsed; 
            
            document.getElementById('result-emoji').innerText = '🎉';
            document.getElementById('result-title').innerText = '太厲害了！';
            document.getElementById('result-title').className = 'text-4xl font-black text-amber-500';
            
            document.getElementById('result-message').innerHTML = `手速超快！<br>只用了 <span class="text-3xl font-black text-amber-900">${timeUsed}</span> 秒！<br>獲得 10 分 ⭐`;
            document.getElementById('result-message').className = 'text-xl text-amber-800 font-bold mb-2 leading-relaxed';
            
            document.getElementById('correct-answer-box').classList.add('hidden'); 
            setupNextButton(true);
        }

        function handleLose(reason) {
            switchScreen('result');
            const timeUsed = reason === 'wrong' ? (TIME_LIMIT - timeLeft) : 60;
            gameTotalTime += timeUsed; 
            
            document.getElementById('result-emoji').innerText = '😿';
            const titleEl = document.getElementById('result-title');
            const msgEl = document.getElementById('result-message');
            
            if (reason === 'wrong') {
                titleEl.innerText = '打錯了啦！';
                titleEl.className = 'text-4xl font-black text-red-500';
                msgEl.innerHTML = '你輸入了錯誤的答案，<br><span class="text-red-600 font-black text-2xl bg-red-100 px-2 rounded border border-red-300">時間已被強制停止！</span>';
            } else {
                titleEl.innerText = '時間到了！';
                titleEl.className = 'text-4xl font-black text-red-500';
                msgEl.innerText = '未能在 1 分鐘內回答出來...';
            }
            msgEl.className = 'text-xl text-amber-900 font-bold mb-2 leading-relaxed';
            
            // ！！！關鍵規則：輸了顯現正確答案！！！
            const currentQ = questions[currentQuestionIndex];
            document.getElementById('correct-answer-box').classList.remove('hidden');
            document.getElementById('correct-answer-text').innerText = `${currentQ.hint} = ${currentQ.answer}`;

            setupNextButton(false);
        }

        function setupNextButton(isWin) {
            const btn = document.getElementById('next-btn');
            const btnText = (currentQuestionIndex === questions.length - 1) ? '查看總成績 🏆' : '下一題 ➔';
            btn.innerText = btnText;
            
            btn.className = isWin 
                ? 'btn-pudding btn-pudding-yellow w-full font-black text-2xl py-4 rounded-xl mt-4' 
                : 'btn-pudding w-full font-black text-2xl py-4 rounded-xl mt-4';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                switchScreen('play');
                loadQuestion();
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            switchScreen('final');
            document.getElementById('final-player-name').innerText = playerName;
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-time').innerText = gameTotalTime;
            
            // 讀取並更新排行榜
            let leaderboard = JSON.parse(localStorage.getItem('puddingTypingLeaderboardV2')) || [];
            
            const currentRecord = {
                name: playerName,
                score: score,
                time: gameTotalTime,
                date: new Date().toLocaleDateString()
            };
            
            let rank = -1;
            // 只有拿到分數才算進排行榜
            if (score > 0) {
                leaderboard.push(currentRecord);
                // 排序規則：1.分數越高越好 2.耗時越少越好
                leaderboard.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return a.time - b.time;
                });
                // 只保留前10名
                leaderboard = leaderboard.slice(0, 10);
                localStorage.setItem('puddingTypingLeaderboardV2', JSON.stringify(leaderboard));
                
                // 找出當前玩家名次 (用物件特徵比對)
                rank = leaderboard.findIndex(r => r.name === currentRecord.name && r.score === currentRecord.score && r.time === currentRecord.time) + 1;
            }

            // ！！！關鍵規則：進入史上最快前三名出現煙花！！！
            const finalMsgEl = document.getElementById('final-message');
            if (rank > 0 && rank <= 3) {
                finalMsgEl.innerHTML = `🐾 太強了！榮登史上最快第 <span class="text-3xl text-amber-500">${rank}</span> 名！ 🐾`;
                finalMsgEl.classList.add('animate-bounce');
                triggerFireworks(); // 觸發煙火
            } else if (score === 0) {
                finalMsgEl.innerText = "一分都沒拿到！下次再仔細一點！💔";
                finalMsgEl.classList.remove('animate-bounce');
            } else {
                finalMsgEl.innerText = "完成挑戰！繼續練習提升手速喔！🐶";
                finalMsgEl.classList.remove('animate-bounce');
            }
            
            // 渲染排行榜 (顯示玩家名字)
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';
            if (leaderboard.length === 0) {
                listEl.innerHTML = '<li class="text-amber-600 text-center py-4 font-normal">目前還沒有紀錄，快來當榜首！</li>';
            } else {
                leaderboard.forEach((record, index) => {
                    let rankIcon = '';
                    if (index === 0) rankIcon = '👑';
                    else if (index === 1) rankIcon = '🥈';
                    else if (index === 2) rankIcon = '🥉';
                    else rankIcon = `<span class="inline-block w-6 text-center text-amber-700">${index + 1}.</span>`;
                    
                    const isCurrent = (record.name === currentRecord.name && record.score === currentRecord.score && record.time === currentRecord.time);
                    const liClass = isCurrent 
                        ? "flex justify-between items-center text-amber-900 bg-amber-200 px-3 py-2 rounded-xl border-2 border-amber-500" 
                        : "flex justify-between items-center text-amber-800 px-3 py-2 border-b-2 border-amber-100 last:border-0";
                    
                    listEl.innerHTML += `
                        <li class="${liClass}">
                            <span class="flex items-center space-x-2 w-2/3">
                                <span>${rankIcon}</span> 
                                <span class="truncate font-black">${record.name}</span>
                                <span class="text-xs text-amber-600">(${record.score}分)</span>
                            </span>
                            <span class="bg-white px-2 py-1 rounded-lg text-sm shadow-sm border border-amber-200 whitespace-nowrap">⏱️ ${record.time}秒</span>
                        </li>
                    `;
                });
            }
        }

        // 煙火特效 (布丁狗配色)
        function triggerFireworks() {
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 35, spread: 360, ticks: 60, zIndex: 100, colors: ['#78350f', '#fbbf24', '#f59e0b', '#fef3c7', '#ffffff'] };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);

                var particleCount = 60 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function resetGame() {
            switchScreen('start');
        }

        function switchScreen(screenName) {
            Object.values(screens).forEach(screen => screen.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }
    </script>
</body>
</html>
