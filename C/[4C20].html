<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM Week - 電腦生字配對挑戰</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --card-back: #16213e;
            --neon-green: #00ff41;
            --neon-pink: #ff007f;
            --text-color: #e0e0e0;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 標題與 UI */
        .header {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }

        .stats-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .stat-box {
            padding: 10px 20px;
            border: 1px solid var(--neon-green);
            background: rgba(0, 255, 65, 0.1);
            border-radius: 5px;
        }

        /* 遊戲區域 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 600px;
            width: 95%;
            margin: 20px auto;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 3/4;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.7;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 2px solid var(--neon-green);
            font-weight: bold;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .card-front {
            background: var(--card-back);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0, 255, 65, 0.1) 5px, rgba(0, 255, 65, 0.1) 10px);
        }

        .card-front::after {
            content: "CPU";
            color: var(--neon-green);
            font-size: 2rem;
            opacity: 0.3;
        }

        .card-back {
            background: #1a1a2e;
            transform: rotateY(180deg);
            color: white;
            box-shadow: inset 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .matched .card-back {
            border-color: var(--neon-pink);
            box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.5);
            color: var(--neon-pink);
        }

        /* 控制按鈕 */
        .controls {
            margin-bottom: 30px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: transparent;
            color: var(--neon-green);
            border: 2px solid var(--neon-green);
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--neon-green);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--neon-green);
        }

        /* 覆蓋層 (倒數與結果) */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 18, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            display: none;
        }

        #countdown-text {
            font-size: 8rem;
            color: var(--neon-green);
            text-shadow: 0 0 30px var(--neon-green);
        }

        /* 排行榜 */
        .leaderboard {
            width: 300px;
            margin-top: 20px;
            border: 1px solid var(--neon-pink);
            padding: 15px;
            background: rgba(255, 0, 127, 0.05);
            border-radius: 10px;
        }

        .leaderboard h2 {
            margin: 0 0 10px 0;
            color: var(--neon-pink);
            font-size: 1.2rem;
            text-align: center;
        }

        .entry {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px dotted rgba(255, 255, 255, 0.2);
        }

        .entry:last-child { border-bottom: none; }

        @media (max-width: 500px) {
            #game-board { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .card-face { font-size: 0.8rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>[STEAM] 電腦生字挑戰賽</h1>
        <div class="stats-container">
            <div class="stat-box">時間: <span id="timer">00.000</span></div>
            <div class="stat-box">配對: <span id="matches">0</span> / 8</div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn" onclick="prepareGame()">開始挑戰</button>
        <button id="rank-btn" onclick="toggleLeaderboard()">查看紀錄</button>
    </div>

    <div id="game-board">
        <!-- 卡牌由 JS 生成 -->
    </div>

    <div class="leaderboard" id="leaderboard-ui">
        <h2>🏆 榮譽排行榜 (最快)</h2>
        <div id="leaderboard-entries">
            <!-- 紀錄由 JS 生成 -->
        </div>
    </div>

    <!-- 準備倒數遮罩 -->
    <div id="overlay" class="overlay">
        <div id="countdown-text">READY?</div>
    </div>

    <script>
        const words = [
            { en: 'CPU', zh: '中央處理器' },
            { en: 'RAM', zh: '記憶體' },
            { en: 'Motherboard', zh: '主機板' },
            { en: 'GPU', zh: '圖形處理器' },
            { en: 'SSD', zh: '固態硬碟' },
            { en: 'Power Supply', zh: '電源供應器' },
            { en: 'Monitor', zh: '顯示器' },
            { en: 'Keyboard', zh: '鍵盤' }
        ];

        let cards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let startTime;
        let timerInterval;
        let isGameRunning = false;

        const board = document.getElementById('game-board');
        const timerDisplay = document.getElementById('timer');
        const matchesDisplay = document.getElementById('matches');
        const overlay = document.getElementById('overlay');
        const countdownText = document.getElementById('countdown-text');

        // 初始化：載入排行榜
        updateLeaderboardDisplay();

        function prepareGame() {
            if (isGameRunning) return;
            
            // 重置遊戲狀態
            board.innerHTML = '';
            matchedCount = 0;
            matchesDisplay.innerText = '0';
            timerDisplay.innerText = '00.000';
            flippedCards = [];
            
            // 顯示倒數遮罩
            overlay.style.display = 'flex';
            let count = 3;
            countdownText.innerText = count;
            
            const countTimer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownText.innerText = count;
                } else if (count === 0) {
                    countdownText.innerText = "GO!";
                } else {
                    clearInterval(countTimer);
                    overlay.style.display = 'none';
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            isGameRunning = true;
            // 準備卡牌數據
            const gameData = [];
            words.forEach(pair => {
                gameData.push({ text: pair.en, matchId: pair.en });
                gameData.push({ text: pair.zh, matchId: pair.en });
            });

            // 打亂順序
            gameData.sort(() => Math.random() - 0.5);

            // 生成 HTML
            gameData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = data.matchId;
                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">${data.text}</div>
                `;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });

            // 開始計時
            startTime = performance.now();
            timerInterval = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            const currentTime = performance.now();
            const elapsed = (currentTime - startTime) / 1000;
            timerDisplay.innerText = elapsed.toFixed(3);
        }

        function flipCard(card) {
            if (!isGameRunning || card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length >= 2) {
                return;
            }

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.id === card2.dataset.id;

            if (isMatch) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount++;
                matchesDisplay.innerText = matchedCount;
                flippedCards = [];

                if (matchedCount === words.length) {
                    endGame();
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            isGameRunning = false;
            const finalTime = parseFloat(timerDisplay.innerText);
            
            setTimeout(() => {
                const playerName = prompt(`太棒了！你完成了配對！\n時間：${finalTime} 秒\n請輸入你的名字：`);
                if (playerName) {
                    saveRecord(playerName, finalTime);
                }
            }, 500);
        }

        // --- 排行榜功能 (本地儲存) ---
        function saveRecord(name, time) {
            let records = JSON.parse(localStorage.getItem('steam_records') || '[]');
            records.push({ name, time });
            // 排序：時間越短越前
            records.sort((a, b) => a.time - b.time);
            // 只保留前 3 名
            records = records.slice(0, 3);
            localStorage.setItem('steam_records', JSON.stringify(records));
            updateLeaderboardDisplay();
        }

        function updateLeaderboardDisplay() {
            const records = JSON.parse(localStorage.getItem('steam_records') || '[]');
            const container = document.getElementById('leaderboard-entries');
            container.innerHTML = '';
            
            if (records.length === 0) {
                container.innerHTML = '<div class="entry">尚無紀錄</div>';
                return;
            }

            records.forEach((r, idx) => {
                const div = document.createElement('div');
                div.className = 'entry';
                div.innerHTML = `<span>#${idx+1} ${r.name}</span> <span>${r.time.toFixed(3)}s</span>`;
                container.appendChild(div);
            });
        }

        function toggleLeaderboard() {
            const ui = document.getElementById('leaderboard-ui');
            ui.style.display = ui.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
