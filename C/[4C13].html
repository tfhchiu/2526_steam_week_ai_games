<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小畫家挑戰</title>
    <!-- 引入 Google Fonts: Fredoka 增添可愛感 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- 引入 Tailwind CSS 作為主要樣式框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
        }
        /* 卡牌翻轉的 3D 效果設定 */
        .perspective-1000 {
            perspective: 1000px;
        }
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }
        
        /* 翻轉動畫 */
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* 成功配對的可愛綠色邊框與發光效果 */
        .matched .card-back {
            border-color: #4ade80 !important; /* Tailwind 的 green-400 */
            background-color: #f0fdf4 !important; /* 淺綠色背景 */
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
            transition: all 0.3s ease-in-out;
        }

        /* 避免使用者在遊戲過程中選取文字 */
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

        /* 自訂可愛滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fdf2f8; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #fbcfe8; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #f9a8d4; 
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-50 via-pink-100 to-purple-100 min-h-screen flex flex-col items-center py-8 text-slate-700">

    <!-- 開始畫面 (獨立介面) -->
    <div id="start-screen" class="flex flex-col items-center justify-center flex-1 w-full max-w-4xl px-4 text-center">
        <div class="text-7xl mb-6 animate-bounce drop-shadow-md">🎨</div>
        <h1 class="text-4xl md:text-5xl font-bold text-pink-500 mb-4 drop-shadow-sm">小畫家挑戰 🧸</h1>
        <p class="text-pink-400 text-base md:text-lg font-semibold mb-8">找出相對應的英文與中文工具名稱。</p>
        
        <!-- 將規則與排行榜並排的容器 -->
        <div class="flex flex-col md:flex-row gap-6 w-full mb-8">
            <!-- 遊戲規則區塊 -->
            <div class="bg-white/60 backdrop-blur-sm rounded-3xl p-6 shadow-sm border-2 border-pink-200 flex-1 flex flex-col">
                <h2 class="text-xl font-bold text-purple-500 mb-4">遊戲規則</h2>
                <ul class="text-gray-600 text-left space-y-2 font-medium flex-1">
                    <li>⏱️ <span class="text-red-400 font-bold">2 分鐘</span> 內完成所有配對</li>
                    <li>🔄 最多只有 <span class="text-purple-500 font-bold">25 次</span> 嘗試機會</li>
                    <li>🎯 成功配對 <span class="text-green-500 font-bold">8 組</span> 繪畫工具單字</li>
                    <li class="pt-2 mt-2 border-t border-pink-100">🏆 <span class="text-yellow-500 font-bold">上榜條件</span>：用時 60 秒內 且 嘗試 20 次內</li>
                </ul>
            </div>

            <!-- 排行榜區塊 -->
            <div class="bg-white/60 backdrop-blur-sm rounded-3xl p-6 shadow-sm border-2 border-yellow-200 flex-1 flex flex-col">
                <h2 class="text-xl font-bold text-yellow-500 mb-4 flex items-center justify-center gap-2">🏆 英雄榜 🏆</h2>
                <div id="leaderboard-preview" class="text-sm md:text-base space-y-2 mb-4 flex-1">
                    <!-- 預覽前3名資料會動態插入在這裡 -->
                    <p class="text-center text-gray-400 font-bold">載入中...</p>
                </div>
                <button id="view-leaderboard-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded-full shadow-[0_4px_0_rgb(234,179,8)] hover:shadow-[0_2px_0_rgb(234,179,8)] hover:translate-y-[2px] transition active:translate-y-[4px] active:shadow-none tracking-wide text-sm mt-auto">
                    查看完整排名 (Top 60)
                </button>
            </div>
        </div>

        <button id="start-btn" class="w-full max-w-md bg-green-400 hover:bg-green-500 text-white font-bold py-4 px-8 rounded-full shadow-[0_6px_0_rgb(34,197,94)] hover:shadow-[0_3px_0_rgb(34,197,94)] hover:translate-y-[3px] transition text-xl active:translate-y-[6px] active:shadow-none tracking-wide">
            開始遊戲
        </button>
    </div>

    <!-- 遊戲畫面 -->
    <div id="game-screen" class="max-w-2xl w-full px-4 flex-col items-center hidden">
        <!-- 遊戲標題與說明 -->
        <header class="text-center mb-6">
            <h1 class="text-3xl md:text-4xl font-bold text-pink-500 mb-2 drop-shadow-sm">🎨 小畫家挑戰 🧸</h1>
            <p class="text-pink-400 text-sm md:text-base font-semibold">找出相對應的英文與中文工具名稱（例如：Brush ↔ 畫筆）。</p>
        </header>

        <!-- 遊戲統計數據 (帶有毛玻璃與可愛邊框) -->
        <div class="flex justify-between w-full mb-4 px-5 py-2 bg-white/60 backdrop-blur-sm rounded-full shadow-sm text-pink-600 font-bold text-sm md:text-lg border-2 border-pink-200">
            <div>時間: <span id="time-left" class="text-red-400">02:00</span></div>
            <div>嘗試: <span id="moves-count" class="text-purple-500">0</span> / 25</div>
            <div>配對: <span id="matches-count" class="text-purple-500">0</span> / 8</div>
        </div>

        <!-- 遊戲網格區 (4x4) -->
        <div id="game-board" class="grid grid-cols-4 gap-2 md:gap-3 w-full max-w-[360px] md:max-w-[480px] aspect-square mb-8 no-select">
            <!-- 卡牌會由 JavaScript 動態生成並插入於此 -->
        </div>

        <!-- 控制按鈕 (立體按壓效果) -->
        <button id="restart-btn" class="bg-pink-400 hover:bg-pink-500 text-white font-bold py-3 px-8 rounded-full shadow-[0_4px_0_rgb(219,39,119)] hover:shadow-[0_2px_0_rgb(219,39,119)] hover:translate-y-[2px] transform transition active:translate-y-[4px] active:shadow-none tracking-wide">
            重新開始遊戲
        </button>
    </div>

    <!-- 遊戲失敗提示彈窗 -->
    <div id="lose-modal" class="fixed inset-0 bg-pink-900 bg-opacity-30 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white border-4 border-purple-300 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-100 transition-transform">
            <div class="text-6xl mb-4">💥</div>
            <h2 class="text-2xl font-bold text-purple-500 mb-2">遊戲結束</h2>
            <p id="lose-reason" class="text-red-400 font-bold mb-6 text-lg"></p>
            <button id="retry-btn" class="w-full bg-purple-400 hover:bg-purple-500 text-white font-bold py-3 px-4 rounded-full shadow-[0_4px_0_rgb(168,85,247)] hover:shadow-[0_2px_0_rgb(168,85,247)] hover:translate-y-[2px] transition active:translate-y-[4px] active:shadow-none tracking-wide">
                再試一次
            </button>
        </div>
    </div>

    <!-- 遊戲過關提示彈窗 -->
    <div id="win-modal" class="fixed inset-0 bg-pink-900 bg-opacity-30 backdrop-blur-sm flex items-center justify-center hidden z-50">
        <div class="bg-white border-4 border-yellow-300 rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl transform scale-100 transition-transform">
            <div class="text-6xl mb-4 animate-bounce">🏆</div>
            <h2 class="text-2xl font-bold text-yellow-500 mb-2">太棒了！</h2>
            <p class="text-gray-500 font-semibold mb-6">
                你成功配對了所有繪畫單字！<br>
                總共嘗試了 <span id="final-moves" class="font-bold text-purple-500"></span> 次。<br>
                用時 <span id="final-time" class="font-bold text-red-400"></span> 秒。
            </p>
            
            <p id="leaderboard-msg" class="text-sm md:text-base font-bold mb-3"></p>

            <!-- 新增：成績記錄輸入區 -->
            <div id="score-input-section" class="mb-5">
                <input type="text" id="player-name" placeholder="請輸入名字 (最多8字)" maxlength="8" class="w-full px-4 py-3 rounded-xl border-2 border-pink-300 focus:outline-none focus:border-pink-500 mb-3 text-center text-pink-600 font-bold bg-pink-50 placeholder-pink-300">
                <button id="save-score-btn" class="w-full bg-green-400 hover:bg-green-500 text-white font-bold py-3 px-4 rounded-full shadow-[0_4px_0_rgb(34,197,94)] hover:shadow-[0_2px_0_rgb(34,197,94)] hover:translate-y-[2px] transition active:translate-y-[4px] active:shadow-none tracking-wide">
                    記錄成績
                </button>
            </div>

            <button id="play-again-btn" class="w-full bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-3 px-4 rounded-full shadow-[0_4px_0_rgb(234,179,8)] hover:shadow-[0_2px_0_rgb(234,179,8)] hover:translate-y-[2px] transition active:translate-y-[4px] active:shadow-none tracking-wide text-sm">
                不記錄，再玩一次
            </button>
        </div>
    </div>

    <!-- 完整排行榜彈窗 -->
    <div id="leaderboard-modal" class="fixed inset-0 bg-pink-900 bg-opacity-40 backdrop-blur-sm flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white border-4 border-yellow-300 rounded-3xl p-6 max-w-md w-full h-[80vh] flex flex-col shadow-2xl transform scale-100 transition-transform relative">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-yellow-500 flex items-center gap-2">🏆 英雄榜 (Top 60)</h2>
                <button id="close-leaderboard-btn" class="text-gray-400 hover:text-pink-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            
            <!-- 列表容器，支援滾動 -->
            <div id="full-leaderboard-list" class="flex-1 overflow-y-auto pr-2 space-y-2">
                <!-- 60名資料會動態插入在這裡 -->
            </div>
        </div>
    </div>

    <script>
        // 定義繪畫工具相關的單字庫 (8對，共16張卡牌，初中難度)
        const vocabulary = [
            { id: 1, en: "Pencil", zh: "鉛筆" },
            { id: 2, en: "Eraser", zh: "橡皮擦" },
            { id: 3, en: "Brush", zh: "畫筆" },
            { id: 4, en: "Paint", zh: "顏料" },
            { id: 5, en: "Paper", zh: "紙張" },
            { id: 6, en: "Ruler", zh: "尺" },
            { id: 7, en: "Marker", zh: "麥克筆" },
            { id: 8, en: "Chalk", zh: "粉筆" }
        ];

        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = true; // 初始鎖定面板，直到玩家點擊開始
        let moves = 0;
        let matches = 0;

        // 新增變數：時間與次數限制
        let timeLeft = 120; 
        let timerInterval = null;
        const maxMoves = 25;
        let gameActive = false;

        const boardElement = document.getElementById('game-board');
        const movesElement = document.getElementById('moves-count');
        const matchesElement = document.getElementById('matches-count');
        const timeLeftElement = document.getElementById('time-left');
        const restartBtn = document.getElementById('restart-btn');
        const winModal = document.getElementById('win-modal');
        const loseModal = document.getElementById('lose-modal');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const playAgainBtn = document.getElementById('play-again-btn');
        const retryBtn = document.getElementById('retry-btn');
        const startBtn = document.getElementById('start-btn');
        const loseReasonElement = document.getElementById('lose-reason');
        const finalMovesElement = document.getElementById('final-moves');

        // 新增 DOM 元素參考
        const finalTimeElement = document.getElementById('final-time');
        const leaderboardMsg = document.getElementById('leaderboard-msg');
        const scoreInputSection = document.getElementById('score-input-section');
        const playerNameInput = document.getElementById('player-name');
        const saveScoreBtn = document.getElementById('save-score-btn');
        
        // 排行榜相關 DOM
        const leaderboardPreview = document.getElementById('leaderboard-preview');
        const viewLeaderboardBtn = document.getElementById('view-leaderboard-btn');
        const leaderboardModal = document.getElementById('leaderboard-modal');
        const closeLeaderboardBtn = document.getElementById('close-leaderboard-btn');
        const fullLeaderboardList = document.getElementById('full-leaderboard-list');

        const LEADERBOARD_KEY = 'painting_match_leaderboard';

        // --- 排行榜相關邏輯 ---
        function getLeaderboard() {
            const data = localStorage.getItem(LEADERBOARD_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveScore(name, timeTaken, movesCount) {
            const board = getLeaderboard();
            board.push({ name, timeTaken, moves: movesCount });
            // 排序：用時短的優先，若時間相同則嘗試次數少的優先
            board.sort((a, b) => {
                if (a.timeTaken === b.timeTaken) return a.moves - b.moves;
                return a.timeTaken - b.timeTaken;
            });
            // 擴展為保留前 60 名
            board.splice(60);
            localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(board));
            renderLeaderboard();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function renderLeaderboard() {
            const board = getLeaderboard();
            if (board.length === 0) {
                leaderboardPreview.innerHTML = '<p class="text-center text-gray-400 font-bold mt-2">目前還沒有記錄，快來搶第一！</p>';
                fullLeaderboardList.innerHTML = '<p class="text-center text-gray-400 font-bold mt-10">虛位以待！快來挑戰！</p>';
                return;
            }
            
            // 渲染首頁預覽 (只顯示前 3 名)
            leaderboardPreview.innerHTML = board.slice(0, 3).map((entry, index) => `
                <div class="flex justify-between items-center bg-white/80 px-4 py-2 rounded-xl border border-yellow-100 shadow-sm mb-2 last:mb-0">
                    <div class="font-bold text-pink-500 w-[40%] text-left truncate flex items-center gap-1">
                        <span class="text-lg">${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : ''}</span>
                        ${escapeHTML(entry.name)}
                    </div>
                    <div class="text-red-400 font-semibold w-[30%] text-center">${entry.timeTaken} 秒</div>
                    <div class="text-purple-500 font-semibold w-[30%] text-right">${entry.moves} 次</div>
                </div>
            `).join('');

            // 渲染完整榜單彈窗 (最多 60 名)
            fullLeaderboardList.innerHTML = board.map((entry, index) => {
                let rankDisplay = '';
                if (index === 0) rankDisplay = '<span class="text-2xl">🥇</span>';
                else if (index === 1) rankDisplay = '<span class="text-2xl">🥈</span>';
                else if (index === 2) rankDisplay = '<span class="text-2xl">🥉</span>';
                else rankDisplay = `<span class="text-gray-400 inline-block w-6 text-center text-sm">${index + 1}.</span>`;

                return `
                <div class="flex justify-between items-center bg-yellow-50/50 px-4 py-3 rounded-xl border border-yellow-200 shadow-sm mb-2 hover:bg-yellow-100 transition">
                    <div class="font-bold text-pink-500 w-[45%] text-left truncate flex items-center gap-2">
                        ${rankDisplay}
                        <span>${escapeHTML(entry.name)}</span>
                    </div>
                    <div class="text-red-400 font-semibold w-[25%] text-center">${entry.timeTaken} 秒</div>
                    <div class="text-purple-500 font-semibold w-[30%] text-right">${entry.moves} 次</div>
                </div>
                `;
            }).join('');
        }
        // ----------------------

        // 格式化時間
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // 初始化面板 (排牌，不啟動計時)
        function initBoard() {
            cards = [];
            firstCard = null;
            secondCard = null;
            lockBoard = true;
            moves = 0;
            matches = 0;
            timeLeft = 120;
            gameActive = false;
            
            clearInterval(timerInterval);
            
            updateStats();
            winModal.classList.add('hidden');
            loseModal.classList.add('hidden');
            boardElement.innerHTML = '';

            vocabulary.forEach(item => {
                cards.push({ text: item.en, matchId: item.id, type: 'en' });
                cards.push({ text: item.zh, matchId: item.id, type: 'zh' });
            });

            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }

            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.classList.add('card', 'perspective-1000', 'w-full', 'h-full', 'cursor-pointer');
                cardEl.dataset.index = index;
                cardEl.dataset.matchId = card.matchId;

                cardEl.innerHTML = `
                    <div class="card-inner w-full h-full relative transform-style-3d rounded-2xl shadow-sm hover:shadow-md transition-shadow">
                        <div class="card-front absolute w-full h-full bg-pink-300 rounded-2xl backface-hidden flex items-center justify-center border-4 border-white hover:bg-pink-400 transition-colors">
                            <span class="text-white text-3xl md:text-4xl drop-shadow-sm">🌸</span>
                        </div>
                        <div class="card-back absolute w-full h-full bg-white rounded-2xl backface-hidden rotate-y-180 flex flex-col items-center justify-center p-1 md:p-2 border-4 border-pink-200 text-center">
                            <span class="${card.type === 'en' ? 'text-sm md:text-base font-bold text-purple-500' : 'text-base md:text-lg font-bold text-pink-600'} break-words w-full">
                                ${card.text}
                            </span>
                        </div>
                    </div>
                `;

                cardEl.addEventListener('click', flipCard);
                boardElement.appendChild(cardEl);
            });
        }

        // 正式開始遊戲並啟動計時器
        function startGame() {
            startScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            gameScreen.classList.add('flex');
            loseModal.classList.add('hidden');
            winModal.classList.add('hidden');
            
            initBoard();
            
            lockBoard = false;
            gameActive = true;
            
            // 計時器開始跳動
            timerInterval = setInterval(() => {
                timeLeft--;
                updateStats();
                
                if (timeLeft <= 0) {
                    endGame(false, "時間到！");
                }
            }, 1000);
        }

        function flipCard() {
            if (lockBoard || !gameActive) return;
            if (this === firstCard) return;
            if (this.classList.contains('matched')) return;

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            updateStats();
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.matchId === secondCard.dataset.matchId;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            
            matches++;
            updateStats();
            resetBoard();

            // 檢查勝敗邏輯
            if (matches === vocabulary.length) {
                endGame(true);
            } else if (moves >= maxMoves) {
                setTimeout(() => endGame(false, "嘗試次數用盡！"), 500);
            }
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
                
                // 檢查是否步數耗盡
                if (moves >= maxMoves && matches < vocabulary.length) {
                    endGame(false, "嘗試次數用盡！");
                }
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        function updateStats() {
            movesElement.textContent = moves;
            matchesElement.textContent = matches;
            timeLeftElement.textContent = formatTime(timeLeft);
            
            // 倒數 10 秒內時間會閃爍提示
            if (timeLeft <= 10 && timeLeft > 0) {
                timeLeftElement.classList.add('animate-pulse');
            } else {
                timeLeftElement.classList.remove('animate-pulse');
            }
        }

        function endGame(isWin, reason = "") {
            gameActive = false;
            lockBoard = true;
            clearInterval(timerInterval); // 停止計時
            
            if (isWin) {
                setTimeout(() => {
                    const timeTaken = 120 - timeLeft;
                    finalMovesElement.textContent = moves;
                    finalTimeElement.textContent = timeTaken;
                    
                    // 判斷是否符合上榜條件：用時 <= 60 且 步數 <= 20
                    if (timeTaken <= 60 && moves <= 20) {
                        leaderboardMsg.textContent = "🌟 恭喜你達成上榜條件！";
                        leaderboardMsg.className = "text-pink-500 font-bold mb-3 text-sm md:text-base";
                        playerNameInput.value = '';
                        scoreInputSection.classList.remove('hidden');
                        playAgainBtn.textContent = "不記錄，再玩一次";
                    } else {
                        leaderboardMsg.textContent = "💡 差一點點！用時 60 秒內且嘗試 20 次內即可上榜喔！";
                        leaderboardMsg.className = "text-gray-400 font-bold mb-3 text-sm md:text-base";
                        scoreInputSection.classList.add('hidden');
                        playAgainBtn.textContent = "再玩一次";
                    }
                    
                    winModal.classList.remove('hidden');
                }, 500);
            } else {
                loseReasonElement.textContent = reason;
                loseModal.classList.remove('hidden');
            }
        }

        function restartGame() {
            clearInterval(timerInterval);
            gameScreen.classList.add('hidden');
            gameScreen.classList.remove('flex');
            startScreen.classList.remove('hidden');
            loseModal.classList.add('hidden');
            winModal.classList.add('hidden');
        }

        restartBtn.addEventListener('click', restartGame);
        playAgainBtn.addEventListener('click', restartGame);
        retryBtn.addEventListener('click', restartGame);
        startBtn.addEventListener('click', startGame);

        // 排行榜彈窗事件
        viewLeaderboardBtn.addEventListener('click', () => {
            leaderboardModal.classList.remove('hidden');
        });
        closeLeaderboardBtn.addEventListener('click', () => {
            leaderboardModal.classList.add('hidden');
        });

        // 綁定儲存成績按鈕
        saveScoreBtn.addEventListener('click', () => {
            const rawName = playerNameInput.value.trim();
            const name = rawName || '匿名玩家';
            const timeTaken = 120 - timeLeft;
            
            // 雙重防護，確保寫入時也符合條件
            if (timeTaken <= 60 && moves <= 20) {
                saveScore(name, timeTaken, moves);
            }
            
            // 記錄後關閉視窗並回到首頁檢視排行榜
            winModal.classList.add('hidden');
            restartGame();
        });

        window.addEventListener('DOMContentLoaded', () => {
            // 載入並顯示排行榜
            renderLeaderboard();
            
            // 頁面載入後顯示獨立開始畫面
            startScreen.classList.remove('hidden');
            gameScreen.classList.add('hidden');
            gameScreen.classList.remove('flex');
        });
    </script>
</body>
</html>
