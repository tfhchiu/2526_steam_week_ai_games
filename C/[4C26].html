<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 梦核阈限空间 - 完整体验版</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0c0c0e;
            font-family: 'Courier New', Courier, monospace;
            color: #b8b8b8;
        }

        /* CRT 扫描线与色差效果 (Chromatic Aberration) */
        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
        }
        
        .crt::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 6;
        }

        #blocker {
            position: absolute;
            width: 100%; height: 100%;
            background-color: rgba(12, 12, 14, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0;
            color: #e0e0e0;
            text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7);
            animation: glitch 4s infinite alternate;
        }

        .instructions {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #836f96;
        }

        .controls {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #6b8e23;
            border: 1px dashed #4a4a4e;
            padding: 20px;
            background: rgba(0,0,0,0.6);
            text-align: left;
            line-height: 1.8;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 3px 0 0 rgba(255,0,0,0.7), -3px 0 0 rgba(0,255,255,0.7); }
            50% { text-shadow: -3px 0 0 rgba(255,0,0,0.7), 3px 0 0 rgba(0,255,255,0.7); }
            20%, 80% { opacity: 0.9; }
        }

        /* 强制拉伸 Canvas，配合低分辨率渲染实现 PS1 像素感 */
        canvas {
            display: block;
            width: 100vw !important;
            height: 100vh !important;
            image-rendering: pixelated; /* 保留马赛克边缘 */
        }
        
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.5);
            transform: translate(-50%, -50%);
            z-index: 4;
            pointer-events: none;
            border-radius: 50%;
        }
    </style>
</head>
<body class="crt">

    <div id="crosshair"></div>

    <div id="blocker">
        <h1>无法醒来的梦</h1>
        <div class="instructions">戴上耳机。点击屏幕进入。</div>
        <div class="controls">
            [ W A S D ] - 在走廊中移动<br>
            [ 鼠 标 ] - 观察四周<br>
            [ ESC ] - 闭上眼睛 (暂停)<br>
            <br>
            <span style="color:#8b0000; font-style: italic;">"这里没有活人，也没有出口..."</span>
        </div>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        let camera, scene, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let prevTime = performance.now();
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        
        let flashlight;
        let floatingObjects = [];
        let tvScreens = []; // 存储电视屏幕贴图以更新雪花动画
        let audioCtx, droneOscillator, droneGain;
        let isAudioInit = false;

        // 规范中的颜色调色盘 (低饱和)
        const COLORS = {
            fog: 0x2b2b2e,       // 灰雾
            weird: 0x836f96,     // 淡紫
            blood: 0x4a0e0e,     // 暗红血迹
            wood: 0x3a2618,      // 腐朽旧木
            plastic: 0x193322    // 劣质暗绿塑料
        };

        init();
        animate();

        function init() {
            // 1. 场景与浓雾 (压抑感)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(COLORS.fog);
            scene.fog = new THREE.FogExp2(COLORS.fog, 0.05); // 指数雾，远处完全不可见

            // 2. 相机
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.y = 3.5; 

            // 3. 诡异光照
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.15); // 极暗环境光
            scene.add(ambientLight);

            // 手电筒 (劣质闪烁荧光灯质感)
            flashlight = new THREE.PointLight(0xddeeff, 1.2, 25);
            camera.add(flashlight);
            scene.add(camera);

            // 4. 控制器
            controls = new THREE.PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');

            blocker.addEventListener('click', function () {
                controls.lock();
                initAudio(); // 首次点击初始化音频
            });

            controls.addEventListener('lock', function () {
                blocker.style.display = 'none';
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
                if(audioCtx) audioCtx.suspend();
            });

            // 5. 生成复古贴图并构建关卡
            const textures = createRetroTextures();
            buildLiminalSpace(textures);

            // 6. 渲染器 (核心 PS1 质感设置)
            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 强制低分辨率，产生像素感
            renderer.setPixelRatio(0.25); 
            document.body.appendChild(renderer.domElement);

            // 7. 事件
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        // --- 程序化生成低清 PS1 贴图 ---
        function createRetroTextures() {
            const createTex = (drawFunc) => {
                const canvas = document.createElement('canvas');
                canvas.width = 64; canvas.height = 64; // 极低分辨率
                const ctx = canvas.getContext('2d');
                drawFunc(ctx, canvas);
                const tex = new THREE.CanvasTexture(canvas);
                tex.magFilter = THREE.NearestFilter; // 强制马赛克过滤，不平滑
                tex.minFilter = THREE.NearestFilter;
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;
                return tex;
            };

            // 脏乱的医院瓷砖地
            const floorTex = createTex((ctx) => {
                ctx.fillStyle = '#3a3a3a'; ctx.fillRect(0,0,64,64);
                ctx.fillStyle = '#454545';
                ctx.fillRect(0,0,32,32); ctx.fillRect(32,32,32,32);
                // 加噪点
                for(let i=0; i<400; i++) {
                    ctx.fillStyle = Math.random()>0.5 ? 'rgba(0,0,0,0.2)' : 'rgba(255,255,255,0.1)';
                    ctx.fillRect(Math.random()*64, Math.random()*64, 2, 2);
                }
            });

            // 发黄斑驳的旧墙纸
            const wallTex = createTex((ctx) => {
                ctx.fillStyle = '#6b6654'; ctx.fillRect(0,0,64,64); // 灰黄
                for(let i=0; i<800; i++) {
                    ctx.fillStyle = `rgba(${50+Math.random()*50}, ${60+Math.random()*50}, 30, ${Math.random()*0.3})`;
                    ctx.fillRect(Math.random()*64, Math.random()*64, 3, 3);
                }
                // 水渍/脏迹 (符合规范：偏脏但不过分写实)
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                ctx.fillRect(10, 0, 15, 64);
                ctx.fillRect(40, 0, 5, 64);
            });

            // 诡异鬼脸贴图 (低清简陋质感，主打心理发毛)
            const faceTex = createTex((ctx) => {
                ctx.fillStyle = '#6b6654'; ctx.fillRect(0,0,64,64); // 墙纸底色
                ctx.fillStyle = '#111';
                ctx.fillRect(15, 20, 10, 12); // 左眼
                ctx.fillRect(39, 22, 10, 10); // 右眼
                ctx.fillRect(20, 45, 24, 8);  // 嘴
                // 噪点模糊面部
                for(let i=0; i<200; i++) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(10+Math.random()*44, 15+Math.random()*40, 2, 2);
                }
            });

            // 血肉模糊块贴图 (低模血腥)
            const fleshTex = createTex((ctx) => {
                ctx.fillStyle = '#4a0e0e'; ctx.fillRect(0,0,64,64); // 暗红
                for(let i=0; i<300; i++) {
                    ctx.fillStyle = Math.random()>0.5 ? '#2a0505' : '#731616';
                    ctx.fillRect(Math.random()*64, Math.random()*64, 4, 4);
                }
            });

            // 电视雪花噪点贴图 (生成一次，后续通过改变UV偏移实现极高能效的动态噪点)
            const tvNoiseTex = createTex((ctx) => {
                for(let x=0; x<64; x+=2) {
                    for(let y=0; y<64; y+=2) {
                        const val = Math.random() * 255;
                        ctx.fillStyle = `rgb(${val},${val},${val})`;
                        ctx.fillRect(x, y, 2, 2); // 放大像素块增强劣质感
                    }
                }
            });

            return { floorTex, wallTex, faceTex, fleshTex, tvNoiseTex };
        }

        // --- 构建阈限空间 (无限重复走廊) ---
        function buildLiminalSpace(textures) {
            // 材质
            const matFloor = new THREE.MeshLambertMaterial({ map: textures.floorTex });
            const matWall = new THREE.MeshLambertMaterial({ map: textures.wallTex });
            const matCeiling = new THREE.MeshLambertMaterial({ color: 0x1a1a1a }); // 纯黑天花板
            const matFace = new THREE.MeshLambertMaterial({ map: textures.faceTex });
            const matFlesh = new THREE.MeshLambertMaterial({ map: textures.fleshTex });
            const matVoid = new THREE.MeshBasicMaterial({ color: 0xffffff }); // 虚空门
            const matWood = new THREE.MeshLambertMaterial({ color: COLORS.wood });
            const matPlastic = new THREE.MeshLambertMaterial({ color: COLORS.plastic });
            const matTVBox = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const matTVScreen = new THREE.MeshBasicMaterial({ map: textures.tvNoiseTex });

            textures.floorTex.repeat.set(20, 20);
            tvScreens.push(textures.tvNoiseTex);

            // 地板和天花板 (无限延伸的平面)
            const planeGeo = new THREE.PlaneGeometry(400, 400);
            const floor = new THREE.Mesh(planeGeo, matFloor);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const ceiling = new THREE.Mesh(planeGeo, matCeiling);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 10;
            scene.add(ceiling);

            // 生成长走廊十字网格
            const wallGeo = new THREE.BoxGeometry(10, 10, 10);
            
            for (let x = -100; x <= 100; x += 20) {
                for (let z = -100; z <= 100; z += 20) {
                    // 留出走廊通道
                    if (Math.abs(x) % 40 === 0 || Math.abs(z) % 40 === 0) continue;
                    
                    // 偶尔墙壁上会出现鬼脸 (极低概率)
                    let currentMat = (Math.random() > 0.98) ? matFace : matWall;
                    
                    const wall = new THREE.Mesh(wallGeo, currentMat);
                    wall.position.set(x, 5, z);
                    scene.add(wall);
                }
            }

            // 添加超现实交互物：漂浮的虚空白门
            const doorFrameGeo = new THREE.BoxGeometry(4, 7, 0.5);
            for(let i=0; i<15; i++) {
                const door = new THREE.Mesh(doorFrameGeo, matVoid);
                door.position.set((Math.random()-0.5)*150, 4 + Math.random()*3, (Math.random()-0.5)*150);
                door.rotation.y = Math.random() * Math.PI;
                scene.add(door);
                floatingObjects.push({ mesh: door, speed: 0.005 + Math.random()*0.01 });
            }

            // 添加血腥/恐怖元素：地上的血肉几何体 (代替具体尸体)
            const meatGeo = new THREE.DodecahedronGeometry(2, 0); // 极低面数
            for(let i=0; i<20; i++) {
                const meat = new THREE.Mesh(meatGeo, matFlesh);
                meat.position.set((Math.random()-0.5)*150, 1, (Math.random()-0.5)*150);
                meat.rotation.set(Math.random(), Math.random(), Math.random());
                scene.add(meat);
            }

            // ==========================================
            // [新增] 超现实互动与反逻辑摆放
            // ==========================================

            // 1. 制造椅子的基础几何体
            function makeChair() {
                const group = new THREE.Group();
                const seatGeo = new THREE.BoxGeometry(2, 0.2, 2);
                const legGeo = new THREE.BoxGeometry(0.2, 2, 0.2);
                const backGeo = new THREE.BoxGeometry(2, 2, 0.2);

                const seat = new THREE.Mesh(seatGeo, matWood);
                seat.position.y = 2;
                group.add(seat);

                const legOffsets = [[-0.8,-0.8], [0.8,-0.8], [-0.8,0.8], [0.8,0.8]];
                legOffsets.forEach(off => {
                    const leg = new THREE.Mesh(legGeo, matWood);
                    leg.position.set(off[0], 1, off[1]);
                    group.add(leg);
                });

                const back = new THREE.Mesh(backGeo, matWood);
                back.position.set(0, 3, -0.9);
                group.add(back);

                return group;
            }

            // 2. 制造老式电视机
            function makeTV() {
                const group = new THREE.Group();
                const boxGeo = new THREE.BoxGeometry(3, 2.5, 2);
                const box = new THREE.Mesh(boxGeo, matTVBox);
                group.add(box);

                const screenGeo = new THREE.PlaneGeometry(2.6, 2.1);
                const screen = new THREE.Mesh(screenGeo, matTVScreen);
                screen.position.set(0, 0, 1.01);
                group.add(screen);

                return group;
            }

            // 3. 反常识布局：天花板上的椅子
            for(let i=0; i<40; i++) {
                const chair = makeChair();
                chair.position.set((Math.random()-0.5)*160, 10, (Math.random()-0.5)*160);
                chair.rotation.x = Math.PI; // 违背常理地倒吊在天花板上
                chair.rotation.y = Math.random() * Math.PI;
                scene.add(chair);
            }

            // 4. 反重力与漂浮：半空中随机自转的噪点电视机
            for(let i=0; i<15; i++) {
                const tv = makeTV();
                tv.position.set((Math.random()-0.5)*120, 2 + Math.random()*5, (Math.random()-0.5)*120);
                tv.rotation.set(Math.random(), Math.random(), Math.random());
                scene.add(tv);
                floatingObjects.push({ mesh: tv, speed: 0.002 + Math.random()*0.01 });
            }

            // 5. 无意义堆砌：大量重复、对称却毫无意义的椅子堆叠柱 (强化荒诞感)
            const stackCenter = new THREE.Vector3(20, 0, 20); // 坐标固定在某个走廊交汇处附近
            for(let i=0; i<15; i++) {
                const chair = makeChair();
                // 荒诞的垂直堆叠，像积木一样直插天花板
                chair.position.set(stackCenter.x, i * 3.5, stackCenter.z);
                chair.rotation.y = (i * Math.PI) / 4; // 严格螺旋对称
                scene.add(chair);
            }

            // 6. 违背物理法则的玩具：悬空静止的低模圆环
            const ringGeo = new THREE.TorusGeometry(1.5, 0.4, 4, 8); // 极低段数，保留方块棱角感
            for(let i=0; i<15; i++) {
                const ring = new THREE.Mesh(ringGeo, matPlastic);
                ring.position.set((Math.random()-0.5)*150, 2 + Math.random()*4, (Math.random()-0.5)*150);
                ring.rotation.x = Math.PI / 2; // 水平悬浮
                scene.add(ring);
                // 缓慢上下浮动，但完全不自转，显得死寂
                floatingObjects.push({ mesh: ring, speed: 0, floatOnly: true });
            }
        }

        // --- 压抑的低频环境音效 (Web Audio API) ---
        function initAudio() {
            if (isAudioInit) return;
            isAudioInit = true;

            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // 生成极低频的嗡嗡声 (Drone)
            droneOscillator = audioCtx.createOscillator();
            droneOscillator.type = 'sine';
            droneOscillator.frequency.value = 40; // 极低频，带来心理不安

            droneGain = audioCtx.createGain();
            droneGain.gain.value = 0.5;

            droneOscillator.connect(droneGain);
            droneGain.connect(audioCtx.destination);
            droneOscillator.start();
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 核心游戏循环 ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                const delta = (time - prevTime) / 1000;

                // 惯性移动计算
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                const speed = 35.0; // 较慢的移动速度，增加压抑感
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 无限走廊错觉：当玩家走到边缘时，瞬间传送到对面 (空间错乱)
                const bounds = 80;
                if (camera.position.x > bounds) camera.position.x = -bounds + 1;
                if (camera.position.x < -bounds) camera.position.x = bounds - 1;
                if (camera.position.z > bounds) camera.position.z = -bounds + 1;
                if (camera.position.z < -bounds) camera.position.z = bounds - 1;

                // 灯光诡异闪烁逻辑 (电压不稳)
                if (Math.random() > 0.93) {
                    flashlight.intensity = 0.1 + Math.random() * 0.5;
                } else {
                    flashlight.intensity = 1.2;
                }

                // 超现实物体动画 (缓慢自转与浮动)
            floatingObjects.forEach((obj, index) => {
                if (!obj.floatOnly) {
                    obj.mesh.rotation.y += obj.speed;
                    obj.mesh.rotation.z += obj.speed * 0.5; // 增加毫无规律的失重翻滚
                }
                obj.mesh.position.y += Math.sin(time * 0.002 + index) * 0.005;
            });

            // 更新电视雪花贴图偏移 (通过光速移动UV位置，以极低性能开销制造动态噪点错觉)
            if (tvScreens.length > 0) {
                tvScreens[0].offset.set(Math.random(), Math.random());
            }

            // 走路时音频音量微调，模拟呼吸/紧张感
                if (audioCtx && audioCtx.state === 'running') {
                    const isMoving = moveForward || moveBackward || moveLeft || moveRight;
                    droneGain.gain.value = isMoving ? 0.8 + Math.sin(time*0.01)*0.1 : 0.5;
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
