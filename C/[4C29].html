<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM Week - Cyber Matching 2.0</title>
    <style>
        :root {
            --bg-color: #05080a;
            --primary-color: #00ffcc;
            --secondary-color: #ff00ff;
            --danger-color: #ff4757;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --font-main: 'Segoe UI', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-main); }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at center, #1a237e 0%, #05080a 100%);
            overflow: hidden;
        }

        .container { text-align: center; width: 95%; max-width: 600px; position: relative; }

        /* 頂部資訊欄 */
        .hud-bar {
            display: flex; justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px; border: 1px solid var(--primary-color);
            border-radius: 10px; margin-bottom: 15px;
            font-weight: bold; font-size: 1.1em;
        }

        .hp-bar { color: var(--danger-color); }
        .level-tag { color: var(--secondary-color); }

        /* 遊戲網格 - 動態調整列數 */
        .game-board {
            display: grid;
            gap: 10px;
            perspective: 1000px;
            margin: 0 auto;
        }

        /* 卡牌設計 */
        .card {
            aspect-ratio: 1/1; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            justify-content: center; align-items: center;
            border-radius: 8px; border: 2px solid #30363d; font-size: 0.9em; padding: 5px;
        }
        .card-front { background: var(--card-bg); color: var(--primary-color); font-size: 1.5em; }
        .card-back { 
            background: #21262
