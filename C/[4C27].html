<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星際避障 Star Dodge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 100%);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #menu, #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(15, 23, 42, 0.9);
            padding: 2rem;
            border-radius: 1rem;
            border: 2px solid #38bdf8;
            color: white;
            min-width: 300px;
        }
        .hidden { display: none; }
        button {
            transition: all 0.2s;
            cursor: pointer;
        }
        button:hover {
            transform: scale(1.05);
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <div class="text-2xl font-bold">分數: <span id="scoreDisplay">0</span></div>
    </div>

    <!-- 開始選單 -->
    <div id="menu">
        <h1 class="text-4xl font-black mb-4 text-sky-400">星際避障</h1>
        <p class="mb-6 text-slate-300">使用滑鼠、手指或方向鍵控制飛船<br>避開隕石以獲取高分！</p>
        <button id="startBtn" class="bg-sky-600 px-8 py-3 rounded-full font-bold text-lg">開始遊戲</button>
    </div>

    <!-- 遊戲結束選單 -->
    <div id="gameOver" class="hidden">
        <h2 class="text-3xl font-bold mb-2 text-red-500">任務失敗</h2>
        <p class="text-xl mb-4">最終得分: <span id="finalScore">0</span></p>
        <button id="restartBtn" class="bg-sky-600 px-8 py-3 rounded-full font-bold text-lg">重新挑戰</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScore = document.getElementById('finalScore');
        const menu = document.getElementById('menu');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // 遊戲狀態
        let gameActive = false;
        let score = 0;
        let animationId;
        let stars = [];
        let obstacles = [];
        let particles = [];
        
        // 玩家物件
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            color: '#38bdf8',
            targetX: 0
        };

        // 初始化畫布大小
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height - 80;
            if (!gameActive) player.x = canvas.width / 2;
        }

        window.addEventListener('resize', resize);
        resize();

        // 監聽操作
        const handleInput = (e) => {
            if (!gameActive) return;
            let clientX;
            if (e.type.includes('touch')) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            player.x = clientX - player.width / 2;
            
            // 邊界檢查
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        };

        window.addEventListener('mousemove', handleInput);
        window.addEventListener('touchstart', handleInput);
        window.addEventListener('touchmove', handleInput);
        
        // 鍵盤操作
        window.addEventListener('keydown', (e) => {
            const step = 20;
            if (e.key === 'ArrowLeft') player.x -= step;
            if (e.key === 'ArrowRight') player.x += step;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        // 背景裝飾：星星
        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        // 隕石類別
        class Obstacle {
            constructor() {
                this.width = 30 + Math.random() * 40;
                this.height = this.width;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = 4 + (score / 100); // 隨分數增加速度
                this.rotation = 0;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#64748b';
                ctx.beginPath();
                // 畫一個不規則的多邊形代表隕石
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = (this.width / 2) * (0.8 + Math.random() * 0.4);
                    const dx = Math.cos(angle) * r;
                    const dy = Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(dx, dy);
                    else ctx.lineTo(dx, dy);
                }
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // 爆炸粒子
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = Math.random() * 4 + 2;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnObstacle() {
            if (!gameActive) return;
            obstacles.push(new Obstacle());
            // 隨機生成間隔
            const nextSpawn = Math.max(200, 1000 - (score * 5));
            setTimeout(spawnObstacle, nextSpawn);
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationId);
            finalScore.innerText = score;
            gameOverScreen.classList.remove('hidden');
            
            // 產生爆炸效果
            for(let i=0; i<30; i++) {
                particles.push(new Particle(player.x + player.width/2, player.y + player.height/2, '#ef4444'));
            }
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製背景星星
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) star.y = 0;
            });

            if (gameActive) {
                // 繪製玩家 (簡單的小飛船)
                ctx.fillStyle = player.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = player.color;
                
                // 飛船主體 (三角形)
                ctx.beginPath();
                ctx.moveTo(player.x + player.width/2, player.y);
                ctx.lineTo(player.x, player.y + player.height);
                ctx.lineTo(player.x + player.width, player.y + player.height);
                ctx.closePath();
                ctx.fill();
                
                // 噴火效果
                ctx.fillStyle = '#f59e0b';
                ctx.beginPath();
                ctx.moveTo(player.x + player.width/4, player.y + player.height);
                ctx.lineTo(player.x + player.width/2, player.y + player.height + 10 + Math.random() * 10);
                ctx.lineTo(player.x + player.width * 0.75, player.y + player.height);
                ctx.fill();
                
                ctx.shadowBlur = 0;

                // 處理障礙物
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.update();
                    obs.draw();

                    if (checkCollision(player, obs)) {
                        endGame();
                    }

                    if (obs.y > canvas.height) {
                        obstacles.splice(i, 1);
                        score += 10;
                        scoreDisplay.innerText = score;
                    }
                }
            }

            // 處理粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            animationId = requestAnimationFrame(update);
        }

        function startGame() {
            score = 0;
            scoreDisplay.innerText = score;
            obstacles = [];
            particles = [];
            gameActive = true;
            menu.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            spawnObstacle();
        }

        startBtn.onclick = startGame;
        restartBtn.onclick = startGame;

        createStars();
        update();
    </script>
</body>
</html>
