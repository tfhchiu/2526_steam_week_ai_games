<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據碰撞：怪獸亂鬥 (Data Clash: Monster Brawl)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-orange: #ff5e00;
            --neon-orange-glow: rgba(255, 94, 0, 0.6);
            --dark-bg: #121212;
            --card-bg: #2a2a2a;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden; /* 防止螢幕滾動 */
        }

        .font-cyber {
            font-family: 'Orbitron', sans-serif;
        }

        /* 霓虹橘色發光效果 */
        .neon-text {
            color: var(--neon-orange);
            text-shadow: 0 0 5px var(--neon-orange-glow), 0 0 10px var(--neon-orange-glow);
        }
        .neon-border {
            border-color: var(--neon-orange);
            box-shadow: 0 0 10px var(--neon-orange-glow), inset 0 0 10px var(--neon-orange-glow);
        }
        .neon-bg {
            background-color: var(--neon-orange);
            box-shadow: 0 0 15px var(--neon-orange-glow);
        }

        /* 卡牌 3D 翻轉 */
        .perspective { perspective: 1000px; }
        .card-inner {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            width: 100%; height: 100%;
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.5rem;
        }
        .card-front {
            background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
            border: 2px solid #333;
            background-image: repeating-linear-gradient(45deg, #222 25%, transparent 25%, transparent 75%, #222 75%, #222), repeating-linear-gradient(45deg, #222 25%, #1a1a1a 25%, #1a1a1a 75%, #222 75%, #222);
            background-position: 0 0, 10px 10px;
            background-size: 20px 20px;
        }
        .card-front:hover { border-color: #555; }
        .card-back {
            transform: rotateY(180deg);
            background-color: #ddd;
            color: #111;
            border: 3px solid var(--neon-orange);
        }
        .card.matched .card-back {
            background-color: var(--neon-orange);
            color: white;
            box-shadow: 0 0 15px var(--neon-orange-glow);
            animation: pulse-match 1s ease;
        }

        @keyframes pulse-match {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        /* 幾何怪獸動畫 */
        .monster-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        .monster-block {
            position: absolute;
            background-color: var(--neon-orange);
            box-shadow: 0 0 10px var(--neon-orange-glow);
            animation: float 3s infinite ease-in-out alternate;
        }
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--dr)) scale(1.1); }
        }
        
        /* 暫停狀態：怪獸停止閃避 */
        .monster-paused .monster-block {
            animation-play-state: paused !important;
            filter: grayscale(0.5) brightness(1.5);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        /* 攻擊飛濺粒子 */
        .particle {
            position: absolute;
            background-color: var(--neon-orange);
            width: 15px; height: 15px;
            box-shadow: 0 0 10px var(--neon-orange-glow);
            pointer-events: none;
            z-index: 50;
        }

        /* 浮動提示字 */
        @keyframes popupText {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            20% { opacity: 1; transform: scale(1.2) translateY(0); }
            80% { opacity: 1; transform: scale(1) translateY(-10px); }
            100% { opacity: 0; transform: scale(0.8) translateY(-30px); }
        }
        .combo-text {
            animation: popupText 2.5s forwards ease-out;
            text-shadow: 0 0 10px #fff, 0 0 20px var(--neon-orange);
        }

        /* 網格佈局：16宮格 (中間 4 格為怪獸) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1 / 1;
            margin: 0 auto;
        }
        @media (max-width: 640px) {
            .game-grid { gap: 6px; }
        }
        
        /* 隱藏捲軸但允許內容滾動 (用於圖鑑) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative selection:bg-orange-500 selection:text-white">

    <!-- 浮動文字提示層 -->
    <div id="alert-layer" class="fixed inset-0 pointer-events-none flex items-center justify-center z-40"></div>

    <!-- 頂部資訊列 -->
    <header class="p-4 flex justify-between items-center shrink-0 border-b border-zinc-800">
        <div>
            <h1 class="text-xl md:text-2xl font-black italic tracking-wider text-zinc-300">
                DATA <span class="neon-text">CLASH</span>
            </h1>
            <p class="text-xs text-zinc-500">消滅數據怪獸！</p>
        </div>
        <div class="text-right flex flex-col items-end">
            <div id="timer-display" class="font-cyber text-3xl md:text-4xl font-bold text-white transition-colors">
                30.000
            </div>
            <div class="w-full h-1 bg-zinc-800 mt-1 rounded-full overflow-hidden">
                <div id="timer-bar" class="h-full bg-orange-500 w-full origin-left transition-transform duration-100"></div>
            </div>
        </div>
    </header>

    <!-- 遊戲主體區域 -->
    <main class="flex-grow flex items-center justify-center p-4 relative">
        <div class="game-grid perspective relative" id="game-board">
            <!-- 中間的怪獸區域 (佔據 row 2-3, col 2-3) -->
            <div id="monster-area" class="col-start-2 col-span-2 row-start-2 row-span-2 relative flex items-center justify-center pointer-events-none z-10">
                <div id="monster" class="monster-container">
                    <!-- 怪獸幾何方塊會由 JS 動態生成 -->
                </div>
                <!-- 剩餘血量提示 -->
                <div id="monster-hp" class="absolute font-cyber text-white text-xl font-bold bg-black/50 px-2 py-1 rounded backdrop-blur-sm hidden">100%</div>
            </div>
            <!-- 卡牌會由 JS 動態插入其他 12 個格子 -->
        </div>
    </main>

    <!-- 底部控制列 -->
    <footer class="p-4 flex justify-between items-center shrink-0">
        <button onclick="showLeaderboard()" class="text-zinc-400 hover:text-white hover:neon-text font-bold transition-all flex items-center gap-2">
            📖 怪獸圖鑑
        </button>
        <button id="giveup-btn" onclick="endGame(false)" class="text-zinc-600 hover:text-red-500 text-sm hidden font-bold">
            撤退 (Give up)
        </button>
    </footer>

    <!-- ================= 彈出視窗 (Modals) ================= -->

    <!-- 1. 開始畫面 -->
    <div id="start-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 transition-opacity duration-300">
        <div class="bg-zinc-900 border border-orange-500/30 p-8 rounded-2xl shadow-[0_0_30px_rgba(255,94,0,0.1)] max-w-sm w-full text-center mx-4">
            <div class="text-6xl mb-4">👾</div>
            <h2 class="text-2xl font-black mb-2 text-white">數據怪獸出現！</h2>
            <p class="text-zinc-400 text-sm mb-6 leading-relaxed">
                在 <strong class="neon-text text-lg">30秒</strong> 內配對<br>「英文縮寫」與「中文解釋」<br>發射攻擊指令將怪獸縮小至消失！<br>
                <span class="text-yellow-500 font-bold mt-2 block">★ 首次擊中將觸發 3 秒時停 Combo！</span>
            </p>
            <button onclick="startGame()" class="w-full neon-bg text-white text-lg font-black italic py-3 rounded-xl tracking-wider hover:scale-105 transition-transform">
                開始戰鬥 (START)
            </button>
        </div>
    </div>

    <!-- 2. 遊戲結算畫面 -->
    <div id="result-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-zinc-900 border-2 neon-border p-8 rounded-2xl max-w-sm w-full text-center mx-4 relative overflow-hidden">
            <h2 id="result-title" class="text-3xl font-black mb-2 italic">討伐成功！</h2>
            
            <div id="time-result" class="font-cyber neon-text text-5xl font-bold my-4">
                12.345s
            </div>
            
            <p id="result-msg" class="text-zinc-300 mb-6 font-bold">怪獸已被徹底粉碎！</p>

            <!-- 破紀錄表單 -->
            <div id="high-score-form" class="hidden mb-6 bg-zinc-800 p-4 rounded-xl border border-zinc-700 text-left">
                <p class="neon-text font-bold mb-3 text-center text-sm">🔥 進入史上前三名！登錄圖鑑：</p>
                <input type="text" id="player-name" maxlength="8" placeholder="玩家代號 (Max 8)" class="w-full font-bold py-2 px-3 bg-black border border-zinc-600 rounded text-white focus:border-orange-500 focus:outline-none mb-3 uppercase text-center">
                <input type="text" id="player-quote" maxlength="15" placeholder="戰勝感言 (例如: 太簡單啦!)" class="w-full font-bold py-2 px-3 bg-black border border-zinc-600 rounded text-white focus:border-orange-500 focus:outline-none text-center text-sm">
            </div>

            <button id="save-restart-btn" onclick="saveAndRestart()" class="w-full bg-white text-black hover:bg-zinc-200 text-lg font-black py-3 rounded-xl transition-colors">
                登錄資料並準備
            </button>
        </div>
    </div>

    <!-- 3. 怪獸圖鑑 (Leaderboard) -->
    <div id="leaderboard-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-zinc-900 border border-zinc-700 p-6 rounded-2xl max-w-md w-full mx-4 h-[80vh] flex flex-col">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <h2 class="text-2xl font-black text-white flex items-center gap-2">
                    📖 怪獸圖鑑
                </h2>
                <button onclick="closeLeaderboard()" class="text-zinc-500 hover:text-white text-3xl font-bold leading-none">&times;</button>
            </div>
            
            <div class="overflow-y-auto no-scrollbar flex-grow pr-2" id="leaderboard-list">
                <!-- 列表動態生成 -->
            </div>
            
            <div class="mt-4 pt-4 border-t border-zinc-800 shrink-0 text-center">
                <button onclick="clearRecords()" class="text-xs text-zinc-600 hover:text-red-500 transition-colors">
                    [開發者] 重置圖鑑數據
                </button>
            </div>
        </div>
    </div>

    <script>
        // ================= 遊戲資料 =================
        // 6對生字 (英文 vs 中文)
        const vocabData = [
            { id: 1, en: 'CPU', ch: '中央處理器' },
            { id: 2, en: 'RAM', ch: '隨機存取記憶體' },
            { id: 3, en: 'GPU', ch: '顯示卡' },
            { id: 4, en: 'SSD', ch: '固態硬碟' },
            { id: 5, en: 'HDD', ch: '傳統硬碟' },
            { id: 6, en: 'USB', ch: '通用序列匯流排' }
        ];

        // 16 宮格中，卡牌應該放置的索引位置 (排除中間四格: 5,6,9,10)
        // 索引從 0 到 15
        const validGridIndices = [0, 1, 2, 3, 4, 7, 8, 11, 12, 13, 14, 15];

        // ================= 全局變數 =================
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let isPlaying = false;
        
        const TOTAL_TIME = 30000; // 30秒
        let timeRemaining = TOTAL_TIME;
        let lastTime = 0;
        let animationFrameId;
        
        let isFirstMatch = true;
        let isPaused = false;
        let timeUsed = 0;
        let monsterScale = 1.0;

        // ================= 初始化 =================
        function initGame() {
            const board = document.getElementById('game-board');
            // 清除現有卡牌 (保留 monster-area)
            Array.from(board.children).forEach(child => {
                if (child.id !== 'monster-area') child.remove();
            });

            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            timeRemaining = TOTAL_TIME;
            isFirstMatch = true;
            isPaused = false;
            monsterScale = 1.0;
            
            updateTimerDisplay();
            generateMonster();

            document.getElementById('timer-display').classList.remove('text-red-500');
            document.getElementById('timer-bar').classList.remove('bg-red-500');
            document.getElementById('timer-bar').classList.add('bg-orange-500');

            // 建立 12 張牌的資料陣列
            vocabData.forEach(item => {
                cards.push({ id: item.id, text: item.en, type: 'en' });
                cards.push({ id: item.id, text: item.ch, type: 'ch' });
            });

            // 洗牌
            cards.sort(() => Math.random() - 0.5);

            // 將牌放入指定的 grid 位置
            cards.forEach((cardData, index) => {
                const gridPos = validGridIndices[index];
                
                const cardEl = document.createElement('div');
                cardEl.className = 'card cursor-pointer perspective';
                // 使用 grid-area 設定絕對網格位置 (row, col)
                const row = Math.floor(gridPos / 4) + 1;
                const col = (gridPos % 4) + 1;
                cardEl.style.gridArea = `${row} / ${col} / span 1 / span 1`;
                
                cardEl.dataset.id = cardData.id;

                // 文字大小動態調整
                const textSize = cardData.type === 'en' ? 'text-2xl md:text-3xl font-cyber' : 'text-sm md:text-base font-bold leading-tight';

                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front text-zinc-700 font-cyber text-2xl border-zinc-700">?</div>
                        <div class="card-back ${textSize}">${cardData.text}</div>
                    </div>
                `;

                cardEl.addEventListener('click', () => handleCardClick(cardEl));
                board.appendChild(cardEl);
            });
        }

        // 產生中央的幾何怪獸
        function generateMonster() {
            const container = document.getElementById('monster');
            container.innerHTML = '';
            container.style.transform = `scale(1)`;
            document.getElementById('monster-hp').classList.add('hidden');
            
            const numBlocks = 20;
            for (let i = 0; i < numBlocks; i++) {
                const block = document.createElement('div');
                block.className = 'monster-block';
                
                // 隨機大小與位置
                const size = 15 + Math.random() * 30; // 15px ~ 45px
                block.style.width = `${size}px`;
                block.style.height = `${size}px`;
                
                // 初始位置集中在中心點附近
                block.style.left = `calc(50% - ${size/2}px + ${(Math.random() - 0.5) * 40}px)`;
                block.style.top = `calc(50% - ${size/2}px + ${(Math.random() - 0.5) * 40}px)`;
                
                // 決定動畫的位移與旋轉量
                block.style.setProperty('--dx', `${(Math.random() - 0.5) * 60}px`);
                block.style.setProperty('--dy', `${(Math.random() - 0.5) * 60}px`);
                block.style.setProperty('--dr', `${(Math.random() - 0.5) * 180}deg`);
                
                // 動畫延遲，讓怪獸看起來像在蠕動
                block.style.animationDelay = `${Math.random() * -3}s`;
                
                container.appendChild(block);
            }
        }

        // ================= 遊戲循環 =================
        function startGame() {
            hideModal('start-modal');
            initGame();
            document.getElementById('giveup-btn').classList.remove('hidden');
            
            isPlaying = true;
            lastTime = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function gameLoop(currentTime) {
            if (!isPlaying) return;

            if (!isPaused) {
                const deltaTime = currentTime - lastTime;
                timeRemaining -= deltaTime;

                // 時間條更新
                const percentage = Math.max(0, (timeRemaining / TOTAL_TIME) * 100);
                document.getElementById('timer-bar').style.transform = `scaleX(${percentage / 100})`;

                // 警告狀態 (最後 10 秒)
                if (timeRemaining <= 10000 && timeRemaining > 0) {
                    document.getElementById('timer-display').classList.add('text-red-500');
                    document.getElementById('timer-bar').classList.replace('bg-orange-500', 'bg-red-500');
                } else {
                    document.getElementById('timer-display').classList.remove('text-red-500');
                    document.getElementById('timer-bar').classList.replace('bg-red-500', 'bg-orange-500');
                }

                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    updateTimerDisplay();
                    endGame(false);
                    return;
                }
            }
            
            lastTime = currentTime;
            updateTimerDisplay();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function updateTimerDisplay() {
            const seconds = (timeRemaining / 1000).toFixed(3);
            document.getElementById('timer-display').innerText = seconds;
        }

        // ================= 點擊與配對邏輯 =================
        function handleCardClick(cardEl) {
            if (!isPlaying || isPaused) return;
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;

            cardEl.classList.add('flipped');
            flippedCards.push(cardEl);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const match = card1.dataset.id === card2.dataset.id;

            if (match) {
                matchedPairs++;
                
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    
                    attackMonster();

                    if (isFirstMatch) {
                        isFirstMatch = false;
                        triggerComboPause();
                    }

                    flippedCards = [];

                    if (matchedPairs === 6) {
                        setTimeout(() => endGame(true), 800);
                    }
                }, 300);

            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                }, 600);
            }
        }

        // ================= 戰鬥特效 =================
        function attackMonster() {
            const container = document.getElementById('monster');
            
            // 縮小怪獸
            monsterScale -= 0.15;
            container.style.transform = `scale(${Math.max(0, monsterScale)})`;
            
            // 移除幾個方塊並產生飛濺粒子
            const blocks = container.querySelectorAll('.monster-block');
            const removeCount = Math.min(3, blocks.length);
            
            for(let i=0; i<removeCount; i++) {
                if(blocks[i]) {
                    createParticle(blocks[i]);
                    blocks[i].remove();
                }
            }

            // 顯示血量提示
            const hpEl = document.getElementById('monster-hp');
            hpEl.classList.remove('hidden');
            hpEl.innerText = `${Math.round(Math.max(0, monsterScale) * 100)}%`;
            
            // 畫面震動
            document.body.animate([
                { transform: 'translate(2px, 2px)' },
                { transform: 'translate(-2px, -2px)' },
                { transform: 'translate(-2px, 2px)' },
                { transform: 'translate(2px, -2px)' },
                { transform: 'translate(0, 0)' }
            ], { duration: 200, iterations: 2 });
        }

        function createParticle(sourceBlock) {
            const rect = sourceBlock.getBoundingClientRect();
            const particle = document.createElement('div');
            particle.className = 'particle rounded-sm';
            
            // 初始位置
            particle.style.left = `${rect.left}px`;
            particle.style.top = `${rect.top}px`;
            
            document.body.appendChild(particle);

            // 計算隨機飛濺方向
            const tx = (Math.random() - 0.5) * 300;
            const ty = (Math.random() - 0.5) * 300;
            const rot = (Math.random() - 0.5) * 720;

            const anim = particle.animate([
                { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
                { transform: `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(0)`, opacity: 0 }
            ], {
                duration: 600 + Math.random() * 400,
                easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
                fill: 'forwards'
            });

            anim.onfinish = () => particle.remove();
        }

        function triggerComboPause() {
            isPaused = true;
            
            // 暫停怪獸動畫
            const monster = document.getElementById('monster');
            monster.classList.add('monster-paused');

            // 顯示字體
            const alertLayer = document.getElementById('alert-layer');
            const text = document.createElement('div');
            text.className = 'combo-text font-black italic text-5xl md:text-7xl text-white text-center leading-tight';
            text.innerHTML = `COMBO HIT!<br><span class="text-3xl text-yellow-400">系統凍結 3 秒</span>`;
            alertLayer.appendChild(text);

            setTimeout(() => {
                isPaused = false;
                lastTime = performance.now(); // 修正時間計算
                monster.classList.remove('monster-paused');
                text.remove();
            }, 3000);
        }

        // ================= 結束與排行榜 =================
        function endGame(isWin) {
            isPlaying = false;
            cancelAnimationFrame(animationFrameId);
            document.getElementById('giveup-btn').classList.add('hidden');

            const title = document.getElementById('result-title');
            const msg = document.getElementById('result-msg');
            const timeDisplay = document.getElementById('time-result');
            const form = document.getElementById('high-score-form');
            const btn = document.getElementById('save-restart-btn');
            
            form.classList.add('hidden');
            timeDisplay.classList.add('hidden');
            document.getElementById('player-name').value = '';
            document.getElementById('player-quote').value = '';

            if (isWin) {
                timeUsed = (TOTAL_TIME - timeRemaining) / 1000;
                
                title.innerText = "討伐成功！";
                title.className = "text-3xl font-black mb-2 italic neon-text";
                msg.innerText = "怪獸已被徹底粉碎！";
                timeDisplay.innerText = `${timeUsed.toFixed(3)}s`;
                timeDisplay.classList.remove('hidden');

                if (checkIfHighScore(timeUsed)) {
                    form.classList.remove('hidden');
                    msg.innerText = "神級反應！你創下了新紀錄！";
                    btn.innerText = "登錄資料並準備";
                } else {
                    btn.innerText = "回到準備畫面";
                }

            } else {
                title.innerText = "任務失敗";
                title.className = "text-3xl font-black mb-2 text-red-500";
                msg.innerText = "怪獸防禦太強，你被擊退了。";
                btn.innerText = "回到準備畫面";
            }

            showModal('result-modal');
        }

        // --- LocalStorage 邏輯 ---
        function getLeaderboard() {
            const data = localStorage.getItem('monsterBrawlLeaderboard');
            return data ? JSON.parse(data) : [];
        }

        function saveLeaderboard(board) {
            localStorage.setItem('monsterBrawlLeaderboard', JSON.stringify(board));
        }

        function checkIfHighScore(time) {
            const board = getLeaderboard();
            if (board.length < 3) return true;
            return time < board[board.length - 1].time;
        }

        function saveAndRestart() {
            const form = document.getElementById('high-score-form');
            
            if (!form.classList.contains('hidden')) {
                const name = document.getElementById('player-name').value.trim() || 'UNKNOWN';
                const quote = document.getElementById('player-quote').value.trim() || '我來，我見，我征服。';
                
                let board = getLeaderboard();
                board.push({ name: name.toUpperCase(), quote: quote, time: timeUsed });
                board.sort((a, b) => a.time - b.time);
                board = board.slice(0, 3);
                saveLeaderboard(board);
            }
            
            hideModal('result-modal');
            
            // 設置停頓點：回到準備畫面並更改按鈕文字為「繼續挑戰」
            setTimeout(() => {
                initGame(); // 先在背景重置遊戲畫面，讓玩家看到新的一局已經準備好
                const startBtn = document.querySelector('#start-modal button');
                startBtn.innerText = "繼續挑戰 (CONTINUE)";
                showModal('start-modal');
            }, 300);
        }

        function showLeaderboard() {
            const board = getLeaderboard();
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';

            if (board.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-zinc-600 opacity-50 pt-10">
                        <span class="text-6xl mb-2">📁</span>
                        <p>圖鑑目前沒有任何擊殺紀錄。</p>
                    </div>`;
            } else {
                const medals = ['👑 首席獵人', '🥈 精銳特工', '🥉 實習戰士'];
                const borderColors = ['border-yellow-500', 'border-gray-400', 'border-orange-700'];
                const glowColors = ['shadow-[0_0_15px_rgba(234,179,8,0.2)]', '', ''];

                board.forEach((record, index) => {
                    const row = document.createElement('div');
                    row.className = `bg-zinc-800 border-l-4 ${borderColors[index]} ${glowColors[index]} p-4 rounded-r-lg mb-4`;
                    row.innerHTML = `
                        <div class="flex justify-between items-end mb-2 border-b border-zinc-700 pb-2">
                            <div>
                                <div class="text-xs text-zinc-500 font-bold mb-1">${medals[index]}</div>
                                <div class="text-xl font-black font-cyber text-white tracking-widest">${record.name}</div>
                            </div>
                            <div class="text-2xl font-cyber font-bold neon-text">${record.time.toFixed(3)}s</div>
                        </div>
                        <div class="text-sm text-zinc-400 italic flex gap-2">
                            <span>💬</span>
                            <span>"${record.quote}"</span>
                        </div>
                    `;
                    listEl.appendChild(row);
                });
            }

            hideModal('start-modal');
            showModal('leaderboard-modal');
        }

        function closeLeaderboard() {
            hideModal('leaderboard-modal');
            if (!isPlaying) {
                setTimeout(() => showModal('start-modal'), 300);
            }
        }

        function clearRecords() {
            if(confirm("確定要清空所有怪獸圖鑑的歷史紀錄嗎？這無法還原。")) {
                localStorage.removeItem('monsterBrawlLeaderboard');
                showLeaderboard(); // 刷新畫面
            }
        }

        // ================= UI 輔助 =================
        function showModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            void modal.offsetWidth; // 觸發重繪
            modal.classList.remove('opacity-0');
        }

        function hideModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // 啟動
        window.onload = () => {
            initGame();
        };

    </script>
</body>
</html>
