<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拯救凱蒂貓：中世紀電腦單字冒險</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --medieval-blue: #2c3e50;
            --medieval-white: #f8f9fa;
            --accent-gold: #d4af37;
        }
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #e5e7eb;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            overflow-x: hidden;
        }
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            backface-visibility: hidden;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            border: 4px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-back {
            background: linear-gradient(135deg, #ffffff 0%, #dbeafe 100%);
            transform: rotateY(180deg);
        }
        .card-front {
            background: #2563eb;
            color: white;
            font-size: 2rem;
        }
        .matched .card-back {
            border-color: #22c55e !important;
            background: #f0fdf4;
        }
        .kitty-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.05;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
        }
        @keyframes dance {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(5deg); }
            75% { transform: translateY(-20px) rotate(-5deg); }
        }
        .dancing-kitty {
            animation: dance 1s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 背景裝飾 -->
    <div class="kitty-bg" id="bgDecor"></div>

    <!-- 遊戲容器 -->
    <div id="app" class="w-full max-w-4xl bg-white/90 backdrop-blur-md rounded-3xl shadow-2xl border-8 border-blue-600 p-6 relative overflow-hidden">
        
        <!-- 主頁面 -->
        <div id="homePage" class="text-center py-10">
            <h1 class="text-5xl md:text-7xl font-black text-blue-900 mb-6 italic drop-shadow-lg">拯救凱蒂貓</h1>
            <p class="text-blue-600 font-bold mb-8 tracking-widest uppercase">中世紀電腦單字挑戰賽</p>
            
            <div class="max-w-xs mx-auto bg-blue-50 border-2 border-blue-200 rounded-xl p-4 mb-10">
                <h3 class="font-bold text-blue-800 border-b border-blue-200 mb-3 pb-1">🏰 英雄榜 (前三名)</h3>
                <div id="leaderboardList" class="space-y-2 text-sm">
                    <!-- 紀錄會顯示在這裡 -->
                </div>
            </div>

            <button onclick="startGame()" class="px-12 py-5 bg-blue-600 text-white rounded-full text-3xl font-black shadow-[0_8px_0_#1e40af] hover:translate-y-1 hover:shadow-[0_4px_0_#1e40af] transition-all">
                開始冒險
            </button>
        </div>

        <!-- 遊戲介面 -->
        <div id="gamePage" class="hidden">
            <div class="flex flex-wrap justify-between items-center mb-6 bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
                <div class="flex items-center gap-4">
                    <div id="timerDisplay" class="text-3xl font-black text-blue-700">60s</div>
                    <div id="levelDisplay" class="bg-blue-600 text-white px-4 py-1 rounded-full text-sm font-bold">第一關：硬體城堡</div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-1 bg-pink-100 px-4 py-1 rounded-full border border-pink-200">
                        <span class="text-xl">🍬</span>
                        <span id="candyCount" class="font-black text-pink-600">0</span>
                    </div>
                    <button onclick="useHint()" id="hintBtn" class="bg-yellow-400 hover:bg-yellow-500 px-4 py-1 rounded-lg font-bold text-yellow-900 shadow-sm disabled:opacity-50">
                        💡 提示 (1糖果)
                    </button>
                </div>
            </div>

            <div id="cardGrid" class="grid grid-cols-4 gap-4 max-w-2xl mx-auto aspect-square">
                <!-- 卡片生成區 -->
            </div>

            <!-- 反饋動畫層 -->
            <div id="feedback" class="fixed inset-0 pointer-events-none flex items-center justify-center z-50 hidden">
                <div class="bg-green-500 text-white px-10 py-5 rounded-full text-4xl font-black shadow-2xl animate-bounce">
                    GOOD! 加油!
                </div>
            </div>
        </div>

        <!-- 倒數遮罩 -->
        <div id="countdownOverlay" class="fixed inset-0 bg-white/80 backdrop-blur flex items-center justify-center z-[100] hidden">
            <div id="countdownNum" class="text-[12rem] font-black text-blue-600 animate-pulse">3</div>
        </div>

        <!-- 結算頁面 -->
        <div id="resultPage" class="hidden text-center py-10">
            <div id="winContent">
                <div class="flex justify-center mb-6">
                    <div class="w-40 h-40 dancing-kitty" id="victoryKitty"></div>
                </div>
                <h2 class="text-5xl font-black text-blue-900 mb-4">拯救成功！</h2>
                <p id="resultMsg" class="text-xl text-blue-600 font-bold mb-8"></p>
                <div class="flex justify-center gap-4 mb-8">
                    <div class="bg-pink-100 px-6 py-3 rounded-2xl border-2 border-pink-200">
                        <span class="text-2xl">🍬 獲得 2 個糖果</span>
                    </div>
                </div>
                <button id="nextLevelBtn" onclick="nextLevel()" class="px-10 py-4 bg-blue-600 text-white rounded-2xl text-2xl font-black shadow-lg hover:bg-blue-700 transition-all">
                    進入下一關
                </button>
            </div>
            <div id="loseContent" class="hidden">
                <h2 class="text-5xl font-black text-gray-400 mb-6">時間耗盡</h2>
                <button onclick="location.reload()" class="px-10 py-4 bg-gray-600 text-white rounded-2xl text-2xl font-black shadow-lg">
                    重新開始
                </button>
            </div>
        </div>
    </div>

    <script>
        const LEVELS = [
            { 
                name: "第一關：硬體城堡", 
                pairs: [
                    {en: "CPU", zh: "處理器"}, {en: "RAM", zh: "記憶體"}, 
                    {en: "Monitor", zh: "顯示器"}, {en: "Keyboard", zh: "鍵盤"},
                    {en: "Mouse", zh: "滑鼠"}, {en: "Storage", zh: "儲存"}
                ]
            },
            { 
                name: "第二關：網絡荒野", 
                pairs: [
                    {en: "Router", zh: "路由器"}, {en: "Server", zh: "伺服器"}, 
                    {en: "IP", zh: "網址協定"}, {en: "Protocol", zh: "協定"},
                    {en: "Firewall", zh: "防火牆"}, {en: "Wi-Fi", zh: "無線網路"}
                ]
            },
            { 
                name: "第三關：代碼聖域", 
                pairs: [
                    {en: "AI", zh: "人工智慧"}, {en: "Algorithm", zh: "演算法"}, 
                    {en: "Variable", zh: "變數"}, {en: "Database", zh: "資料庫"},
                    {en: "Coding", zh: "編寫代碼"}, {en: "Bug", zh: "錯誤"}
                ]
            }
        ];

        let currentLevel = 0;
        let cards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let timeLeft = 60;
        let timer = null;
        let candies = 0;

        // 初始化背景凱蒂貓
        const bgDecor = document.getElementById('bgDecor');
        for(let i=0; i<20; i++) {
            const icon = document.createElement('div');
            icon.innerHTML = `<svg viewBox="0 0 100 100" class="w-16 h-16"><circle cx="50" cy="55" r="35" fill="white" stroke="#333" stroke-width="2"/><path d="M25 35 Q15 15 35 25M75 35 Q85 15 65 25" fill="white" stroke="#333" stroke-width="2"/><circle cx="40" cy="50" r="3" fill="black"/><circle cx="60" cy="50" r="3" fill="black"/><circle cx="50" cy="60" r="4" fill="#ffcc00"/></svg>`;
            icon.style.transform = `rotate(${Math.random()*360}deg)`;
            bgDecor.appendChild(icon);
        }

        // 讀取紀錄
        function updateLeaderboard() {
            const records = JSON.parse(localStorage.getItem('kittyRecords') || '[]');
            const list = document.getElementById('leaderboardList');
            if(records.length === 0) {
                list.innerHTML = '<p class="text-gray-400 italic">尚未有勇者紀錄</p>';
                return;
            }
            list.innerHTML = records.slice(0, 3).map((r, i) => `
                <div class="flex justify-between font-bold">
                    <span>${i+1}. 勇者</span>
                    <span>關卡 ${r.level} (${r.time}s)</span>
                </div>
            `).join('');
        }
        updateLeaderboard();

        function startGame() {
            document.getElementById('homePage').classList.add('hidden');
            document.getElementById('gamePage').classList.remove('hidden');
            initCards();
        }

        function initCards() {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            const levelData = LEVELS[currentLevel];
            document.getElementById('levelDisplay').innerText = levelData.name;
            
            let cardData = [];
            levelData.pairs.forEach((p, index) => {
                cardData.push({ text: p.en, pairId: index, type: 'en' });
                cardData.push({ text: p.zh, pairId: index, type: 'zh' });
            });
            
            // 洗牌
            cardData.sort(() => Math.random() - 0.5);
            
            cardData.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = 'card relative flipped'; // 預設翻開 2 秒
                card.dataset.index = index;
                card.dataset.pairId = data.pairId;
                card.innerHTML = `
                    <div class="card-inner w-full h-full">
                        <div class="card-front">?</div>
                        <div class="card-back text-blue-900 font-bold p-2 text-center text-sm md:text-base">
                            ${data.text}
                        </div>
                    </div>
                `;
                card.onclick = () => handleCardClick(card);
                grid.appendChild(card);
                cards.push(card);
            });

            // 翻開 2 秒供記憶
            setTimeout(() => {
                cards.forEach(c => c.classList.remove('flipped'));
                startCountdown();
            }, 2000);
        }

        function startCountdown() {
            const overlay = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNum');
            overlay.classList.remove('hidden');
            let count = 3;
            num.innerText = count;
            
            const countInterval = setInterval(() => {
                count--;
                if(count <= 0) {
                    clearInterval(countInterval);
                    overlay.classList.add('hidden');
                    startTimer();
                }
                num.innerText = count;
            }, 1000);
        }

        function startTimer() {
            timeLeft = 60;
            updateTimerDisplay();
            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function updateTimerDisplay() {
            document.getElementById('timerDisplay').innerText = timeLeft + 's';
        }

        function handleCardClick(card) {
            if(flippedCards.length >= 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);

            if(flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if(c1.dataset.pairId === c2.dataset.pairId) {
                // 配對成功
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedCount++;
                showFeedback();
                flippedCards = [];
                if(matchedCount === 6) endGame(true);
            } else {
                // 配對失敗
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                }, 800);
            }
        }

        function showFeedback() {
            const fb = document.getElementById('feedback');
            fb.classList.remove('hidden');
            setTimeout(() => fb.classList.add('hidden'), 1000);
        }

        function useHint() {
            if(candies < 1 || flippedCards.length !== 1) return;
            const current = flippedCards[0];
            const partner = Array.from(document.querySelectorAll('.card:not(.matched):not(.flipped)')).find(c => c.dataset.pairId === current.dataset.pairId);
            
            if(partner) {
                candies--;
                document.getElementById('candyCount').innerText = candies;
                handleCardClick(partner);
            }
        }

        function endGame(success) {
            clearInterval(timer);
            document.getElementById('gamePage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');

            if(success) {
                candies += 2;
                document.getElementById('candyCount').innerText = candies;
                document.getElementById('winContent').classList.remove('hidden');
                document.getElementById('loseContent').classList.add('hidden');
                document.getElementById('resultMsg').innerText = `你在 ${60 - timeLeft} 秒內完成了 ${LEVELS[currentLevel].name}`;
                document.getElementById('victoryKitty').innerHTML = `<svg viewBox="0 0 100 100" class="w-full h-full"><circle cx="50" cy="55" r="35" fill="white" stroke="#333" stroke-width="2"/><path d="M25 35 Q15 15 35 25M75 35 Q85 15 65 25" fill="white" stroke="#333" stroke-width="2"/><circle cx="40" cy="50" r="3" fill="black"/><circle cx="60" cy="50" r="3" fill="black"/><circle cx="50" cy="60" r="4" fill="#ffcc00"/><rect x="65" y="20" width="20" height="15" rx="5" fill="#ff4d4d"/></svg>`;
                
                // 儲存紀錄
                saveRecord();
                
                if(currentLevel >= 2) {
                    document.getElementById('nextLevelBtn').innerText = "重玩冒險";
                    document.getElementById('nextLevelBtn').onclick = () => location.reload();
                }
            } else {
                document.getElementById('winContent').classList.add('hidden');
                document.getElementById('loseContent').classList.remove('hidden');
            }
        }

        function saveRecord() {
            let records = JSON.parse(localStorage.getItem('kittyRecords') || '[]');
            records.push({ level: currentLevel + 1, time: 60 - timeLeft, date: new Date().toLocaleDateString() });
            records.sort((a, b) => b.level !== a.level ? b.level - a.level : a.time - b.time);
            localStorage.setItem('kittyRecords', JSON.stringify(records.slice(0, 3)));
            updateLeaderboard();
        }

        function nextLevel() {
            currentLevel++;
            matchedCount = 0;
            flippedCards = [];
            cards = [];
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('gamePage').classList.remove('hidden');
            initCards();
        }
    </script>
</body>
</html>
