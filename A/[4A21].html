<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048 網頁完整版</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --tile-empty: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            touch-action: none; /* 重要：防止移動端默認手勢 */
            overflow: hidden;
        }

        .container {
            width: 90vw;
            max-width: 400px;
            user-select: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 50px;
            font-weight: bold;
            color: var(--text-dark);
            margin: 0;
        }

        .score-container {
            background: var(--grid-bg);
            padding: 10px 25px;
            border-radius: 5px;
            color: white;
            text-align: center;
        }

        .score-label { font-size: 13px; font-weight: bold; display: block; }
        .score-value { font-size: 25px; font-weight: bold; }

        .controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: background 0.2s;
        }

        .btn:hover { background: #7f6a56; }

        #grid-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--grid-bg);
            border-radius: 6px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 12px;
            padding: 12px;
            box-sizing: border-box;
            position: relative;
        }

        .tile {
            width: 100%;
            height: 100%;
            background-color: var(--tile-empty);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--text-dark);
            transition: all 0.1s ease-in-out;
        }

        /* 數字顏色 */
        .tile-2 { background: #eee4da; }
        .tile-4 { background: #ede0c8; }
        .tile-8 { background: #f2b179; color: var(--text-light); }
        .tile-16 { background: #f59563; color: var(--text-light); }
        .tile-32 { background: #f67c5f; color: var(--text-light); }
        .tile-64 { background: #f65e3b; color: var(--text-light); }
        .tile-128 { background: #edcf72; color: var(--text-light); font-size: 28px; }
        .tile-256 { background: #edcc61; color: var(--text-light); font-size: 28px; }
        .tile-512 { background: #edc850; color: var(--text-light); font-size: 28px; }
        .tile-1024 { background: #edc53f; color: var(--text-light); font-size: 24px; }
        .tile-2048 { background: #edc22e; color: var(--text-light); font-size: 24px; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 6px;
        }
        .overlay h2 { font-size: 40px; color: var(--text-dark); margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="title">2048</h1>
            <div class="score-container">
                <span class="score-label">SCORE</span>
                <span id="score" class="score-value">0</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="resetGame()">重新開始</button>
        </div>

        <div id="grid-container">
            <!-- 覆蓋層放在這裡 -->
            <div id="game-over" class="overlay">
                <h2>遊戲結束</h2>
                <button class="btn" onclick="resetGame()">再試一次</button>
            </div>
        </div>
        
        <p style="text-align: center; color: #776e65; margin-top: 20px;">
            使用 <b>方向鍵</b> 或 <b>滑動螢幕</b> 來移動
        </p>
    </div>

    <script>
        let grid = [];
        let score = 0;
        const size = 4;

        // 初始化
        function init() {
            const container = document.getElementById('grid-container');
            // 清空除 overlay 外的所有內容
            const overlay = document.getElementById('game-over');
            container.innerHTML = '';
            container.appendChild(overlay);

            for (let i = 0; i < size * size; i++) {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.id = `cell-${Math.floor(i/size)}-${i%size}`;
                container.appendChild(tile);
            }
            
            setupInput();
            resetGame();
        }

        function resetGame() {
            grid = Array(size).fill().map(() => Array(size).fill(0));
            score = 0;
            document.getElementById('game-over').style.display = 'none';
            addRandomTile();
            addRandomTile();
            updateBoard();
        }

        function addRandomTile() {
            let emptyCells = [];
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if (emptyCells.length > 0) {
                let {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateBoard() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const tile = document.getElementById(`cell-${r}-${c}`);
                    const value = grid[r][c];
                    tile.innerText = value === 0 ? '' : value;
                    tile.className = 'tile'; 
                    if (value > 0) {
                        tile.classList.add(`tile-${value}`);
                    }
                }
            }
            document.getElementById('score').innerText = score;
            if (isGameOver()) {
                document.getElementById('game-over').style.display = 'flex';
            }
        }

        function slide(row) {
            let arr = row.filter(val => val !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i+1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i+1] = 0;
                }
            }
            arr = arr.filter(val => val !== 0);
            while (arr.length < size) arr.push(0);
            return arr;
        }

        function move(direction) {
            let oldGrid = JSON.stringify(grid);

            if (direction === 'left' || direction === 'right') {
                for (let r = 0; r < size; r++) {
                    let row = [...grid[r]];
                    if (direction === 'right') row.reverse();
                    let newRow = slide(row);
                    if (direction === 'right') newRow.reverse();
                    grid[r] = newRow;
                }
            } else {
                for (let c = 0; c < size; c++) {
                    let row = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    if (direction === 'down') row.reverse();
                    let newRow = slide(row);
                    if (direction === 'down') newRow.reverse();
                    for (let r = 0; r < size; r++) grid[r][c] = newRow[r];
                }
            }

            if (oldGrid !== JSON.stringify(grid)) {
                addRandomTile();
                updateBoard();
            }
        }

        function isGameOver() {
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < size - 1 && grid[r][c] === grid[r][c+1]) return false;
                    if (r < size - 1 && grid[r][c] === grid[r+1][c]) return false;
                }
            }
            return true;
        }

        // 設置輸入監聽
        function setupInput() {
            // 鍵盤監聽
            window.removeEventListener('keydown', handleKeyDown);
            window.addEventListener('keydown', handleKeyDown);

            // 觸控監聽 (Swipe)
            let touchStartX = 0;
            let touchStartY = 0;

            document.addEventListener('touchstart', (e) => {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                if (!touchStartX || !touchStartY) return;

                let dx = e.changedTouches[0].clientX - touchStartX;
                let dy = e.changedTouches[0].clientY - touchStartY;

                if (Math.abs(dx) > Math.abs(dy)) {
                    if (Math.abs(dx) > 30) move(dx > 0 ? 'right' : 'left');
                } else {
                    if (Math.abs(dy) > 30) move(dy > 0 ? 'down' : 'up');
                }
                touchStartX = 0;
                touchStartY = 0;
            }, { passive: false });
        }

        function handleKeyDown(e) {
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)) {
                e.preventDefault(); 
                switch(e.key) {
                    case 'ArrowLeft': move('left'); break;
                    case 'ArrowRight': move('right'); break;
                    case 'ArrowUp': move('up'); break;
                    case 'ArrowDown': move('down'); break;
                }
            }
        }

        // 確保 DOM 載入後運行
        window.onload = init;
    </script>
</body>
</html>
