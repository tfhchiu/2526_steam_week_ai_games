<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STEAM 極致挑戰 - 輕鬆穿牆版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Share+Tech+Mono&display=swap');

        :root {
            --primary: #facc15;
            --accent: #38bdf8;
            --bg-gradient: linear-gradient(135deg, #fefce8 0%, #fffbeb 100%);
        }

        body {
            background: var(--bg-gradient);
            font-family: 'ZCOOL KuaiLe', cursive;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #arena {
            position: relative;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(250, 204, 21, 0.2), inset 0 0 20px rgba(255,255,255,1);
            padding: 10px;
            transition: transform 0.1s ease-out;
        }

        canvas {
            display: block;
            background-color: #fafaf9;
            border-radius: 32px;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 18px;
            padding: 6px 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .stats-overlay {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .timer-font {
            font-family: 'Share Tech Mono', monospace;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 32px;
            margin: 10px;
        }

        .difficulty-btn {
            width: 100%;
            padding: 14px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.2rem;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .diff-easy { background: #dcfce7; color: #166534; }
        .diff-normal { background: #fef9c3; color: #854d0e; }
        .diff-hard { background: #fee2e2; color: #991b1b; }

        .difficulty-btn:hover { transform: scale(1.03); }
        .difficulty-btn:active { transform: scale(0.97); }

        .controls-grid {
            margin-top: 20px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 10px;
        }

        .ctrl-btn {
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 6px 0 #e2e8f0;
            user-select: none;
        }

        #countdown {
            font-size: 9rem;
            font-weight: 900;
            color: var(--primary);
        }

        .particle {
            position: absolute;
            pointer-events: none;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: explode 0.7s ease-out forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; translate: var(--tx) var(--ty); }
        }

        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, -4px); }
        }
        .shake-active { animation: shake 0.2s ease-in-out; }
    </style>
</head>
<body>

    <div class="mb-4 text-center">
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter">
            <span class="text-yellow-500">STEAM</span> 菁英競技場
        </h1>
        <p class="text-xs text-slate-400 font-bold">輕鬆探索模式：支援穿牆功能</p>
    </div>

    <div id="arena">
        <canvas id="gameCanvas"></canvas>
        
        <div class="stats-overlay">
            <div class="glass-panel">
                <span class="text-[10px] block text-slate-400 font-bold leading-none uppercase">Score 分數</span>
                <span id="score" class="text-lg font-black text-yellow-600">000</span>
            </div>
            <div class="glass-panel text-right">
                <span class="text-[10px] block text-slate-400 font-bold leading-none uppercase">Timer 計時</span>
                <span id="timer" class="text-lg font-black text-sky-500 timer-font">0.000s</span>
            </div>
        </div>
        
        <div id="overlay">
            <div id="difficulty-menu" class="text-center px-8 w-full max-w-xs">
                <h2 class="text-3xl font-black text-slate-800 mb-6">選擇難度</h2>
                <div class="space-y-3">
                    <button onclick="selectDifficulty(220)" class="difficulty-btn diff-easy">🐢 悠閒模式</button>
                    <button onclick="selectDifficulty(150)" class="difficulty-btn diff-normal">⭐ 一般模式</button>
                    <button onclick="selectDifficulty(90)" class="difficulty-btn diff-hard">🔥 挑戰模式</button>
                </div>
            </div>

            <div id="result-screen" class="hidden text-center px-8">
                <h2 class="text-4xl font-black text-slate-800 mb-2">挑戰結束</h2>
                <div class="flex gap-4 mb-8">
                    <div class="glass-panel flex-1">
                        <p class="text-[10px] text-gray-400 font-bold">積分</p>
                        <p id="last-score" class="text-2xl font-black">0</p>
                    </div>
                    <div class="glass-panel flex-1">
                        <p class="text-[10px] text-gray-400 font-bold">秒數</p>
                        <p id="last-time" class="text-2xl font-black">0.000</p>
                    </div>
                </div>
                <button onclick="showDifficultyMenu()" class="bg-yellow-400 px-8 py-3 rounded-full font-black text-white shadow-lg">重新開始</button>
            </div>
            
            <div id="countdown" class="hidden">3</div>
        </div>
    </div>

    <div class="controls-grid">
        <div class="ctrl-btn" style="grid-area: up" id="btn-up">▲</div>
        <div class="ctrl-btn" style="grid-area: left" id="btn-left">◀</div>
        <div class="ctrl-btn" style="grid-area: down" id="btn-down">▼</div>
        <div class="ctrl-btn" style="grid-area: right" id="btn-right">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const diffMenu = document.getElementById('difficulty-menu');
        const resultScreen = document.getElementById('result-screen');
        const countdownEl = document.getElementById('countdown');
        const arena = document.getElementById('arena');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(f, d, type='sine', v=0.1) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = type; o.frequency.value = f;
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        const size = 18;
        const count = 22;
        canvas.width = canvas.height = size * count;

        let snake, foods, dx, dy, nextDx, nextDy, score, startTime, gameTimer, gameLoop;
        let isRunning = false;
        let chosenSpeed = 100;
        let scaleEffect = 0;
        const FOOD_COUNT = 5; // 增加食物到 5 個，讓遊戲更簡單

        function showDifficultyMenu() {
            resultScreen.classList.add('hidden');
            diffMenu.classList.remove('hidden');
        }

        function selectDifficulty(speed) {
            chosenSpeed = speed;
            audioCtx.resume();
            diffMenu.classList.add('hidden');
            countdownEl.classList.remove('hidden');
            
            let c = 3;
            countdownEl.innerText = c;
            beep(400, 0.2, 'sine', 0.05);

            const t = setInterval(() => {
                c--;
                if(c > 0) {
                    countdownEl.innerText = c;
                    beep(400, 0.2, 'sine', 0.05);
                } else if (c === 0) {
                    countdownEl.innerText = "GO";
                    beep(800, 0.4, 'triangle', 0.1);
                } else {
                    clearInterval(t);
                    countdownEl.classList.add('hidden');
                    overlay.style.display = 'none';
                    actualStart();
                }
            }, 700);
        }

        function actualStart() {
            score = 0;
            scoreEl.innerText = "000";
            snake = [{x: 11, y: 11}, {x: 11, y: 12}, {x: 11, y: 13}];
            dx = 0; dy = -1; nextDx = 0; nextDy = -1;
            
            foods = [];
            for(let i=0; i<FOOD_COUNT; i++) {
                foods.push(generateFoodPos());
            }
            
            startTime = performance.now();
            isRunning = true;
            gameTimer = setInterval(() => {
                timerEl.innerText = ((performance.now() - startTime) / 1000).toFixed(3) + 's';
            }, 30);
            gameLoop = setInterval(update, chosenSpeed);
        }

        function generateFoodPos() {
            let newFood;
            while(true) {
                newFood = { x: Math.floor(Math.random() * count), y: Math.floor(Math.random() * count) };
                const onSnake = snake.some(p => p.x === newFood.x && p.y === newFood.y);
                const onFood = foods && foods.some(f => f.x === newFood.x && f.y === newFood.y);
                if(!onSnake && !onFood) break;
            }
            return newFood;
        }

        function update() {
            dx = nextDx; dy = nextDy;
            
            // 穿牆邏輯：如果超過邊界，從另一邊出現
            let nextX = snake[0].x + dx;
            let nextY = snake[0].y + dy;
            
            if (nextX < 0) nextX = count - 1;
            if (nextX >= count) nextX = 0;
            if (nextY < 0) nextY = count - 1;
            if (nextY >= count) nextY = 0;

            const head = {x: nextX, y: nextY};

            // 只有撞到自己會結束
            if (snake.some(p => p.x === head.x && p.y === head.y)) {
                return gameOver();
            }

            snake.unshift(head);

            let eatenIndex = -1;
            for(let i=0; i<foods.length; i++) {
                if(head.x === foods[i].x && head.y === foods[i].y) {
                    eatenIndex = i;
                    break;
                }
            }

            if (eatenIndex !== -1) {
                score += 10;
                scoreEl.innerText = score.toString().padStart(3, '0');
                scaleEffect = 5;
                triggerEatEffects(foods[eatenIndex].x, foods[eatenIndex].y);
                foods[eatenIndex] = generateFoodPos();
            } else {
                snake.pop();
            }
            if(scaleEffect > 0) scaleEffect *= 0.8;
            draw();
        }

        function triggerEatEffects(x, y) {
            beep(700, 0.1, 'square', 0.05);
            arena.classList.add('shake-active');
            setTimeout(() => arena.classList.remove('shake-active'), 200);

            const colors = ['#facc15', '#38bdf8', '#f87171', '#4ade80', '#fb923c'];
            for(let i=0; i<12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = (canvas.offsetLeft + x * size + size/2) + 'px';
                p.style.top = (canvas.offsetTop + y * size + size/2) + 'px';
                p.style.setProperty('--tx', (Math.random()-0.5)*150 + 'px');
                p.style.setProperty('--ty', (Math.random()-0.5)*150 + 'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 700);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 星星食物
            ctx.font = '20px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            foods.forEach(f => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#facc15';
                ctx.fillText('⭐', f.x * size + size/2, f.y * size + size/2);
            });
            ctx.shadowBlur = 0;

            // 蛇
            snake.forEach((p, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#fbbf24' : '#fef08a';
                
                const s = isHead ? scaleEffect : 0;
                const offset = 2 - s/2;
                const bodySize = size - 4 + s;

                ctx.beginPath();
                ctx.roundRect(p.x * size + offset, p.y * size + offset, bodySize, bodySize, isHead ? 8 : 4);
                ctx.fill();

                if(isHead) {
                    ctx.fillStyle = '#854d0e';
                    const cx = p.x * size + size/2;
                    const cy = p.y * size + size/2;
                    ctx.beginPath();
                    if(dx === 1 || (dx===0 && dy===0)) { ctx.arc(cx+4, cy-3, 1.5, 0, 7); ctx.arc(cx+4, cy+3, 1.5, 0, 7); }
                    else if(dx === -1) { ctx.arc(cx-4, cy-3, 1.5, 0, 7); ctx.arc(cx-4, cy+3, 1.5, 0, 7); }
                    else if(dy === 1) { ctx.arc(cx-3, cy+4, 1.5, 0, 7); ctx.arc(cx+3, cy+4, 1.5, 0, 7); }
                    else { ctx.arc(cx-3, cy-4, 1.5, 0, 7); ctx.arc(cx+3, cy-4, 1.5, 0, 7); }
                    ctx.fill();
                }
            });
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            clearInterval(gameTimer);
            beep(150, 0.6, 'sawtooth', 0.1);
            
            document.getElementById('last-score').innerText = score;
            document.getElementById('last-time').innerText = timerEl.innerText.replace('s', '');
            
            overlay.style.display = 'flex';
            resultScreen.classList.remove('hidden');
        }

        const move = (dir) => {
            if(!isRunning) return;
            if(dir === 'up' && dy === 0) { nextDx = 0; nextDy = -1; }
            if(dir === 'down' && dy === 0) { nextDx = 0; nextDy = 1; }
            if(dir === 'left' && dx === 0) { nextDx = -1; nextDy = 0; }
            if(dir === 'right' && dx === 0) { nextDx = 1; nextDy = 0; }
        };

        window.addEventListener('keydown', e => {
            if(['ArrowUp','w','ArrowDown','s','ArrowLeft','a','ArrowRight','d'].includes(e.key)) e.preventDefault();
            if(e.key === 'ArrowUp' || e.key === 'w') move('up');
            if(e.key === 'ArrowDown' || e.key === 's') move('down');
            if(e.key === 'ArrowLeft' || e.key === 'a') move('left');
            if(e.key === 'ArrowRight' || e.key === 'd') move('right');
        });

        const reg = (id, d) => {
            const el = document.getElementById(id);
            el.onmousedown = el.ontouchstart = (e) => { e.preventDefault(); move(d); };
        };
        reg('btn-up','up'); reg('btn-down','down'); reg('btn-left','left'); reg('btn-right','right');

        draw();
    </script>
</body>
</html>
