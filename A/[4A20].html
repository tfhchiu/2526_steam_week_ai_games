<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清新學習樂園 - 生字配對遊戲</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 使用全域方式引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- 引入 Babel 以解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 canvas-confetti 彩帶特效庫 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #fbbf24; border-radius: 20px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-in.fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .animate-in.zoom-in { animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- 內建圖示 ---
        const IconSend = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        const IconGamepad2 = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><rect width="20" height="12" x="2" y="6" rx="2"/></svg>;
        const IconMessageSquare = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const IconCheckCircle = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconRotateCcw = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const IconTrophy = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconClock = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconMedal = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="m13 12 5.88-9.8"/><path d="M8 7h8"/><circle cx="12" cy="17" r="5"/><polyline points="12 18 13 16 14 17 13 15 12 15"/></svg>;
        const IconPlay = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>;

        const VOCAB_LIST = [
            { id: 1, en: 'Smartphone', zh: '智慧型手機' },
            { id: 2, en: 'Internet', zh: '網際網路' },
            { id: 3, en: 'Message', zh: '訊息' },
            { id: 4, en: 'Screen', zh: '螢幕' },
            { id: 5, en: 'Password', zh: '密碼' },
            { id: 6, en: 'Email', zh: '電子郵件' },
            { id: 7, en: 'Game', zh: '遊戲' },
            { id: 8, en: 'Video', zh: '影片' }
        ];

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function App() {
            const [gameState, setGameState] = useState('idle');
            const [countdown, setCountdown] = useState(3);
            const [timeElapsed, setTimeElapsed] = useState(0);
            const [leaderboard, setLeaderboard] = useState([]);

            const [enWords, setEnWords] = useState([]);
            const [zhWords, setZhWords] = useState([]);
            const [selectedEn, setSelectedEn] = useState(null);
            const [selectedZh, setSelectedZh] = useState(null);
            const [matchedIds, setMatchedIds] = useState([]);
            
            const [matchEffect, setMatchEffect] = useState(null);
            const [wrongMatch, setWrongMatch] = useState(false);

            const [name, setName] = useState('');
            const [content, setContent] = useState('');
            const [messages, setMessages] = useState([]);
            const [playerName, setPlayerName] = useState('');

            useEffect(() => {
                const savedLeaderboard = localStorage.getItem('fresh_game_leaderboard');
                const savedMessages = localStorage.getItem('fresh_game_messages');
                
                if (savedLeaderboard) setLeaderboard(JSON.parse(savedLeaderboard));
                if (savedMessages) {
                    setMessages(JSON.parse(savedMessages));
                } else {
                    setMessages([{ id: 1, name: '系統管理員', content: '歡迎來到學習樂園！快來挑戰單字配對，把名字留在排行榜上吧！', date: new Date().toLocaleDateString() }]);
                }
            }, []);

            useEffect(() => {
                if (leaderboard.length > 0) localStorage.setItem('fresh_game_leaderboard', JSON.stringify(leaderboard));
            }, [leaderboard]);

            useEffect(() => {
                if (messages.length > 0) localStorage.setItem('fresh_game_messages', JSON.stringify(messages));
            }, [messages]);

            useEffect(() => {
                let timer;
                if (gameState === 'countdown') {
                    if (countdown > 0) {
                        timer = setTimeout(() => setCountdown(c => c - 1), 1000);
                    } else {
                        setGameState('playing');
                        setTimeElapsed(0);
                    }
                } else if (gameState === 'playing') {
                    timer = setInterval(() => setTimeElapsed(t => t + 1), 1000);
                }
                return () => {
                    if (timer) clearTimeout(timer);
                    if (timer) clearInterval(timer);
                };
            }, [gameState, countdown]);

            useEffect(() => {
                if (matchedIds.length === VOCAB_LIST.length && VOCAB_LIST.length > 0 && gameState === 'playing') {
                    setGameState('won');
                }
            }, [matchedIds, gameState]);

            const handleStartClick = () => {
                setEnWords(shuffleArray(VOCAB_LIST));
                setZhWords(shuffleArray(VOCAB_LIST));
                setSelectedEn(null);
                setSelectedZh(null);
                setMatchedIds([]);
                setWrongMatch(false);
                setMatchEffect(null);
                setCountdown(3);
                setGameState('countdown');
            };

            const handleBackToMain = () => {
                setGameState('idle');
                setMatchEffect(null);
            };

            const handleWordClick = (word, type) => {
                if (matchedIds.includes(word.id) || gameState !== 'playing') return;

                if (type === 'en') {
                    setSelectedEn(word);
                    if (selectedZh) checkMatch(word, selectedZh);
                } else {
                    setSelectedZh(word);
                    if (selectedEn) checkMatch(selectedEn, word);
                }
            };

            const checkMatch = (en, zh) => {
                if (en.id === zh.id) {
                    setMatchedIds([...matchedIds, en.id]);
                    setSelectedEn(null);
                    setSelectedZh(null);
                    
                    setMatchEffect('correct');
                    
                    // 觸發彩帶特效
                    if (typeof confetti === 'function') {
                        confetti({
                            particleCount: 60, // 彩帶數量
                            spread: 60,       // 散開角度
                            origin: { y: 0.7 }, // 發射位置 (0~1，0.7約在畫面偏下方)
                            colors: ['#4ade80', '#facc15', '#fb923c', '#60a5fa'] // 綠、黃、橘、藍
                        });
                    }
                    
                    setTimeout(() => setMatchEffect(null), 500);
                } else {
                    setWrongMatch(true);
                    
                    setMatchEffect('wrong');
                    setTimeout(() => {
                        setSelectedEn(null);
                        setSelectedZh(null);
                        setWrongMatch(false);
                        setMatchEffect(null);
                    }, 600);
                }
            };

            const handleSaveRecord = (e) => {
                e.preventDefault();
                if (!playerName.trim()) return;

                const newRecord = { 
                    id: Date.now(), 
                    name: playerName.trim(), 
                    time: timeElapsed
                };
                
                const newLeaderboard = [...leaderboard, newRecord]
                    .sort((a, b) => a.time - b.time)
                    .slice(0, 3);
                    
                setLeaderboard(newLeaderboard);
                setPlayerName('');
                setGameState('idle');
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!name.trim() || !content.trim()) return;

                const newMessage = {
                    id: Date.now(),
                    name: name.trim(),
                    content: content.trim(),
                    date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                setMessages([newMessage, ...messages]);
                setName('');
                setContent('');
            };

            return (
                /* 在這裡將原本的薄荷綠背景，改為黃金漸層 (from-yellow-100 via-amber-200 to-yellow-300) */
                <div className="min-h-screen relative bg-gradient-to-br from-yellow-100 via-amber-200 to-yellow-300 font-sans text-gray-800 p-4 md:p-8 overflow-hidden">
                    
                    {/* 背景閃爍特效層 (保留綠/紅光閃爍效果) */}
                    <div className={`absolute inset-0 pointer-events-none transition-opacity duration-300 z-0 ${
                        matchEffect === 'correct' ? 'bg-green-400 opacity-40' : 
                        matchEffect === 'wrong' ? 'bg-red-500 opacity-40' : 
                        'opacity-0'
                    }`}></div>

                    {/* 主要內容區 */}
                    <div className="relative z-10">
                        <header className="max-w-5xl mx-auto mb-10 text-center">
                            <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-orange-500 mb-4 inline-flex items-center gap-3 drop-shadow-sm">
                                <IconGamepad2 className="w-10 h-10 text-orange-500" />
                                清新學習樂園
                            </h1>
                            <p className="text-amber-800/80 text-lg font-medium">初中生專屬：生活科技單字挑戰與心得分享</p>
                        </header>

                        <main className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
                            {/* 左側：遊戲區域 */}
                            <section className={`bg-white/80 backdrop-blur-md rounded-3xl p-6 md:p-8 border-2 transition-all duration-300 flex flex-col min-h-[500px] ${
                                matchEffect === 'correct' ? 'border-green-400 shadow-[0_0_30px_rgba(74,222,128,0.6)]' :
                                matchEffect === 'wrong' ? 'border-red-400 shadow-[0_0_30px_rgba(248,113,113,0.6)]' :
                                'border-white shadow-xl shadow-amber-900/10'
                            }`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-amber-800 flex items-center gap-2">
                                        <IconGamepad2 className="w-6 h-6" /> 單字配對任務
                                    </h2>
                                    {gameState === 'playing' && (
                                        <div className="flex items-center gap-2 bg-amber-100 px-4 py-1.5 rounded-full text-amber-700 font-bold shadow-inner">
                                            <IconClock className="w-4 h-4" /> {timeElapsed} 秒
                                        </div>
                                    )}
                                    {(gameState === 'playing' || gameState === 'won') && (
                                        <button onClick={handleBackToMain} className="p-2 text-amber-600 hover:bg-amber-100 rounded-full transition-colors" title="返回主畫面">
                                            <IconRotateCcw className="w-5 h-5" />
                                        </button>
                                    )}
                                </div>

                                {gameState === 'idle' && (
                                    <div className="flex-1 flex flex-col items-center justify-center space-y-8 animate-in fade-in">
                                        <div className="text-center">
                                            <p className="text-amber-900/70 mb-6 font-medium">點擊下方按鈕開始挑戰，測驗你的生活科技單字！</p>
                                            <button onClick={handleStartClick} className="px-8 py-3.5 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-full font-bold text-xl shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all flex items-center gap-2 mx-auto group">
                                                <IconPlay className="w-6 h-6 group-hover:scale-110 transition-transform" /> 開始遊戲
                                            </button>
                                        </div>
                                        
                                        <div className="w-full max-w-sm bg-white/70 rounded-2xl p-5 border border-amber-100 shadow-sm">
                                            <h3 className="text-amber-800 font-bold flex items-center gap-2 mb-3 border-b border-amber-100 pb-3">
                                                <IconMedal className="w-5 h-5 text-yellow-500" /> 神人排行榜 (Top 3)
                                            </h3>
                                            {leaderboard.length === 0 ? (
                                                <p className="text-center text-sm text-amber-900/50 py-6">目前還沒有人挑戰，快來搶下第一名！</p>
                                            ) : (
                                                <ul className="space-y-3">
                                                    {leaderboard.map((record, idx) => (
                                                        <li key={record.id} className="flex justify-between items-center text-sm bg-white p-3 rounded-xl shadow-sm border border-amber-50 hover:border-amber-200 transition-colors">
                                                            <div className="flex items-center gap-3">
                                                                <span className={`font-black text-lg w-6 text-center ${idx === 0 ? 'text-yellow-500' : idx === 1 ? 'text-gray-400' : 'text-amber-600'}`}>
                                                                    {idx + 1}
                                                                </span>
                                                                <span className="font-bold text-gray-700 text-base">{record.name}</span>
                                                            </div>
                                                            <span className="text-orange-500 font-bold bg-orange-50 px-3 py-1 rounded-lg">{record.time} 秒</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {gameState === 'countdown' && (
                                    <div className="flex-1 flex flex-col items-center justify-center animate-in zoom-in">
                                        <p className="text-2xl text-amber-600 mb-6 font-bold">準備好囉...</p>
                                        <div className="text-9xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-orange-400 to-amber-600 animate-pulse drop-shadow-lg">
                                            {countdown}
                                        </div>
                                    </div>
                                )}

                                {gameState === 'won' && (
                                    <div className="flex flex-col items-center justify-center flex-1 text-center space-y-4 animate-in fade-in zoom-in">
                                        <div className="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mb-2 shadow-inner">
                                            <IconTrophy className="w-12 h-12 text-amber-500 drop-shadow" />
                                        </div>
                                        <h3 className="text-3xl font-bold text-amber-800">任務完成！</h3>
                                        <p className="text-gray-600 text-lg">
                                            你的通關時間是：<span className="text-3xl font-black text-orange-500 mx-2">{timeElapsed}</span> 秒
                                        </p>
                                        
                                        <form onSubmit={handleSaveRecord} className="w-full max-w-xs mt-6 flex flex-col gap-3">
                                            <input
                                                type="text"
                                                value={playerName}
                                                onChange={(e) => setPlayerName(e.target.value)}
                                                placeholder="輸入大名登上排行榜"
                                                className="w-full px-4 py-3 rounded-xl bg-white border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-400 text-center font-bold text-amber-800 shadow-sm"
                                                required maxLength="10"
                                            />
                                            <button type="submit" className="w-full px-6 py-3 bg-gradient-to-r from-orange-400 to-amber-500 text-white rounded-xl font-bold text-lg shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all">
                                                儲存成績
                                            </button>
                                            <button type="button" onClick={handleBackToMain} className="mt-2 text-sm text-amber-600 font-medium hover:text-amber-800 hover:underline transition-all">
                                                不儲存，返回主畫面
                                            </button>
                                        </form>
                                    </div>
                                )}

                                {gameState === 'playing' && (
                                    <div className="flex gap-4 flex-1 animate-in fade-in">
                                        <div className="flex-1 flex flex-col gap-3">
                                            <h3 className="text-sm font-semibold text-amber-600/70 mb-2 uppercase tracking-wider text-center">英文單字</h3>
                                            {enWords.map(word => {
                                                const isMatched = matchedIds.includes(word.id);
                                                const isSelected = selectedEn?.id === word.id;
                                                const isError = isSelected && wrongMatch;
                                                return (
                                                    <button key={`en-${word.id}`} disabled={isMatched} onClick={() => handleWordClick(word, 'en')}
                                                        className={`p-3 rounded-2xl text-center font-bold transition-all duration-300 relative overflow-hidden shadow-sm ${isMatched ? 'bg-amber-100 text-amber-400 opacity-50 cursor-not-allowed scale-95' : isError ? 'bg-red-100 text-red-600 border-red-200 animate-shake' : isSelected ? 'bg-orange-400 text-white shadow-md scale-105' : 'bg-white text-amber-900 hover:bg-amber-50 border border-amber-100 hover:shadow-md text-base md:text-lg'}`}>
                                                        {word.en}
                                                        {isMatched && <IconCheckCircle className="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-50" />}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        <div className="flex-1 flex flex-col gap-3">
                                            <h3 className="text-sm font-semibold text-amber-600/70 mb-2 uppercase tracking-wider text-center">中文意思</h3>
                                            {zhWords.map(word => {
                                                const isMatched = matchedIds.includes(word.id);
                                                const isSelected = selectedZh?.id === word.id;
                                                const isError = isSelected && wrongMatch;
                                                return (
                                                    <button key={`zh-${word.id}`} disabled={isMatched} onClick={() => handleWordClick(word, 'zh')}
                                                        className={`p-3 rounded-2xl text-center font-bold transition-all duration-300 relative overflow-hidden shadow-sm ${isMatched ? 'bg-amber-100 text-amber-400 opacity-50 cursor-not-allowed scale-95' : isError ? 'bg-red-100 text-red-600 border-red-200 animate-shake' : isSelected ? 'bg-orange-400 text-white shadow-md scale-105' : 'bg-white text-amber-900 hover:bg-amber-50 border border-amber-100 hover:shadow-md text-base md:text-lg'}`}>
                                                        {word.zh}
                                                        {isMatched && <IconCheckCircle className="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 opacity-50" />}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                            </section>

                            {/* 右側：表單與留言板 */}
                            <section className="flex flex-col gap-6">
                                <div className="bg-white/80 backdrop-blur-md rounded-3xl p-6 md:p-8 shadow-xl shadow-amber-900/10 border border-white">
                                    <h2 className="text-2xl font-bold text-amber-800 flex items-center gap-2 mb-6">
                                        <IconMessageSquare className="w-6 h-6" /> 學習心得分享
                                    </h2>
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div>
                                            <label htmlFor="name" className="block text-sm font-medium text-amber-800 mb-1 ml-1">你的名字</label>
                                            <input type="text" id="name" value={name} onChange={(e) => setName(e.target.value)} placeholder="請輸入暱稱 (例如: 小明)" className="w-full px-4 py-3 rounded-2xl bg-white/80 border border-amber-200 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all shadow-sm" required />
                                        </div>
                                        <div>
                                            <label htmlFor="content" className="block text-sm font-medium text-amber-800 mb-1 ml-1">留言內容</label>
                                            <textarea id="content" value={content} onChange={(e) => setContent(e.target.value)} placeholder="寫下你想說的話，或是遊戲破關的心得吧！" rows="3" className="w-full px-4 py-3 rounded-2xl bg-white/80 border border-amber-200 focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent transition-all shadow-sm resize-none" required></textarea>
                                        </div>
                                        <button type="submit" className="w-full py-3.5 bg-gradient-to-r from-orange-400 to-amber-500 hover:from-orange-500 hover:to-amber-600 text-white rounded-2xl font-bold text-lg shadow-md hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2 group">
                                            <IconSend className="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" /> 送出留言
                                        </button>
                                    </form>
                                </div>

                                <div className="bg-white/60 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-white/60 flex-1">
                                    <h3 className="text-lg font-semibold text-amber-800 mb-4 px-2">最新動態</h3>
                                    <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                        {messages.length === 0 ? (
                                            <p className="text-center text-amber-700/50 py-8">目前還沒有留言，來當第一個吧！</p>
                                        ) : (
                                            messages.map((msg) => (
                                                <div key={msg.id} className="bg-white p-4 rounded-2xl shadow-sm border border-amber-100">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="font-bold text-amber-800">{msg.name}</span>
                                                        <span className="text-xs text-amber-600/60">{msg.date}</span>
                                                    </div>
                                                    <p className="text-amber-950/80 leading-relaxed text-sm md:text-base">{msg.content}</p>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </section>
                        </main>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
