<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雙核大戰：位元爭奪</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel 用於在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 m-0 p-0 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 內建圖標組件 (取代 lucide-react 以實現單檔獨立運行) ---
    const CpuIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
    );
    const TrophyIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
    );
    const GamepadIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="6" x2="10" y1="12" y2="12"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="15" x2="15.01" y1="13" y2="13"/><line x1="18" x2="18.01" y1="11" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>
    );
    const InfoIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    );
    const RefreshIcon = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    );

    // --- 遊戲邏輯常數與輔助函數 ---
    const GRID_SIZE = 20;
    const TICK_RATE = 180; // 遊戲速度 (毫秒)
    const WINNING_SCORE = 10;

    const DIRS = {
      UP: { x: 0, y: -1 },
      DOWN: { x: 0, y: 1 },
      LEFT: { x: -1, y: 0 },
      RIGHT: { x: 1, y: 0 }
    };

    const random4Bit = () => Array.from({ length: 4 }, () => Math.round(Math.random()));

    const generateTarget = (maxScore) => {
      let level, title, display, sequence;

      if (maxScore < 3) {
        level = 1;
        title = "基礎二進制";
        sequence = random4Bit();
        display = sequence.join('');
      } else if (maxScore < 6) {
        level = 2;
        title = "邏輯運算";
        const a = random4Bit();
        const b = random4Bit();
        const ops = ['AND', 'OR', 'XOR'];
        const op = ops[Math.floor(Math.random() * ops.length)];
        
        display = `${a.join('')} ${op}\n${b.join('')}`;
        sequence = a.map((val, i) => {
          if (op === 'AND') return val & b[i];
          if (op === 'OR') return val | b[i];
          return val ^ b[i];
        });
      } else if (maxScore < 8) {
        level = 3;
        title = "十六進制轉換";
        const num = Math.floor(Math.random() * 15) + 1;
        display = `Hex: ${num.toString(16).toUpperCase()}`;
        sequence = num.toString(2).padStart(4, '0').split('').map(Number);
      } else {
        level = 4;
        title = "反轉運算 (NOT)";
        const orig = random4Bit();
        display = `NOT ${orig.join('')}`;
        sequence = orig.map(val => val === 1 ? 0 : 1);
      }

      return { level, title, display, sequence };
    };

    const getRandomEmptyPos = (entities) => {
      let x, y;
      let isOccupied = true;
      while (isOccupied) {
        x = Math.floor(Math.random() * GRID_SIZE);
        y = Math.floor(Math.random() * GRID_SIZE);
        isOccupied = entities.some(e => e.x === x && e.y === y);
      }
      return { x, y };
    };

    // --- 主遊戲組件 ---
    function App() {
      const [gameState, setGameState] = useState('menu');
      const [winner, setWinner] = useState(null);
      const [showHelp, setShowHelp] = useState(false);

      const engineRef = useRef({
        p1: { x: 2, y: 2, body: [], dir: 'RIGHT', nextDir: 'RIGHT', collected: [], score: 0 },
        p2: { x: GRID_SIZE - 3, y: GRID_SIZE - 3, body: [], dir: 'LEFT', nextDir: 'LEFT', collected: [], score: 0 },
        bits: [],
        target: null
      });

      const [renderState, setRenderState] = useState({ ...engineRef.current });

      const initGame = useCallback(() => {
        const initialState = {
          p1: { x: 2, y: 2, body: [], dir: 'RIGHT', nextDir: 'RIGHT', collected: [], score: 0 },
          p2: { x: GRID_SIZE - 3, y: GRID_SIZE - 3, body: [], dir: 'LEFT', nextDir: 'LEFT', collected: [], score: 0 },
          bits: [],
          target: generateTarget(0)
        };

        // 追蹤已佔用的格子，避免生成時重疊 (Bug 修復)
        const occupiedPositions = [
          {x: 2, y: 2}, 
          {x: GRID_SIZE - 3, y: GRID_SIZE - 3}
        ];

        for (let i = 0; i < 20; i++) {
          const pos = getRandomEmptyPos(occupiedPositions);
          initialState.bits.push({ ...pos, val: i % 2 });
          occupiedPositions.push(pos);
        }

        engineRef.current = initialState;
        setRenderState(initialState);
        setGameState('playing');
        setWinner(null);
      }, []);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameState !== 'playing') return;
          const state = engineRef.current;

          // P1 (WASD)
          if (e.key === 'w' || e.key === 'W') { if (state.p1.dir !== 'DOWN') state.p1.nextDir = 'UP'; }
          if (e.key === 's' || e.key === 'S') { if (state.p1.dir !== 'UP') state.p1.nextDir = 'DOWN'; }
          if (e.key === 'a' || e.key === 'A') { if (state.p1.dir !== 'RIGHT') state.p1.nextDir = 'LEFT'; }
          if (e.key === 'd' || e.key === 'D') { if (state.p1.dir !== 'LEFT') state.p1.nextDir = 'RIGHT'; }

          // P2 (Arrows)
          if (e.key === 'ArrowUp') { e.preventDefault(); if (state.p2.dir !== 'DOWN') state.p2.nextDir = 'UP'; }
          if (e.key === 'ArrowDown') { e.preventDefault(); if (state.p2.dir !== 'UP') state.p2.nextDir = 'DOWN'; }
          if (e.key === 'ArrowLeft') { e.preventDefault(); if (state.p2.dir !== 'RIGHT') state.p2.nextDir = 'LEFT'; }
          if (e.key === 'ArrowRight') { e.preventDefault(); if (state.p2.dir !== 'LEFT') state.p2.nextDir = 'RIGHT'; }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState]);

      useEffect(() => {
        if (gameState !== 'playing') return;

        const gameLoop = setInterval(() => {
          const state = engineRef.current;
          const { p1, p2, bits, target } = state;

          const updatePlayer = (p, otherP, isP1) => {
            p.dir = p.nextDir;
            const newX = p.x + DIRS[p.dir].x;
            const newY = p.y + DIRS[p.dir].y;
            let died = false;

            if (newX < 0 || newX >= GRID_SIZE || newY < 0 || newY >= GRID_SIZE) died = true;
            if (otherP.body.some(segment => segment.x === newX && segment.y === newY) || (otherP.x === newX && otherP.y === newY)) died = true;
            if (p.body.some(segment => segment.x === newX && segment.y === newY)) died = true;

            if (died) {
              p.x = isP1 ? 2 : GRID_SIZE - 3;
              p.y = isP1 ? 2 : GRID_SIZE - 3;
              p.body = [];
              p.collected = [];
              p.dir = isP1 ? 'RIGHT' : 'LEFT';
              p.nextDir = p.dir;
              return false; 
            }

            p.body.unshift({ x: p.x, y: p.y });
            if (p.body.length > 2 + p.collected.length * 2) {
              p.body.pop();
            }

            p.x = newX;
            p.y = newY;

            const bitIndex = bits.findIndex(b => b.x === p.x && b.y === p.y);
            if (bitIndex !== -1) {
              const eatenBit = bits[bitIndex];
              bits.splice(bitIndex, 1);

              const newPos = getRandomEmptyPos([...p1.body, ...p2.body, {x: p1.x, y: p1.y}, {x: p2.x, y: p2.y}, ...bits]);
              bits.push({ ...newPos, val: eatenBit.val });

              const expectedVal = target.sequence[p.collected.length];
              
              if (eatenBit.val === expectedVal) {
                p.collected.push(eatenBit.val);
                if (p.collected.length === target.sequence.length) {
                  p.score += 1;
                  p.collected = []; 
                  return true; 
                }
              } else {
                p.collected = [];
              }
            }
            return false;
          };

          const p1Scored = updatePlayer(p1, p2, true);
          const p2Scored = updatePlayer(p2, p1, false);

          if (p1.score >= WINNING_SCORE) {
            setWinner('核心一號 (藍)');
            setGameState('gameover');
          } else if (p2.score >= WINNING_SCORE) {
            setWinner('核心二號 (紅)');
            setGameState('gameover');
          } else if (p1Scored || p2Scored) {
            const maxScore = Math.max(p1.score, p2.score);
            state.target = generateTarget(maxScore);
            
            // Bug 修復：有人得分更新題目時，必須重置雙方的收集進度，確保競賽公平
            if (p1Scored) p2.collected = [];
            if (p2Scored) p1.collected = [];
          }

          setRenderState({
            p1: { ...p1, body: [...p1.body], collected: [...p1.collected] },
            p2: { ...p2, body: [...p2.body], collected: [...p2.collected] },
            bits: [...bits],
            target: { ...state.target }
          });

        }, TICK_RATE);

        return () => clearInterval(gameLoop);
      }, [gameState]);

      const renderGrid = () => {
        const { p1, p2, bits } = renderState;
        const cells = [];

        for (let y = 0; y < GRID_SIZE; y++) {
          for (let x = 0; x < GRID_SIZE; x++) {
            let isP1Head = p1.x === x && p1.y === y;
            let isP2Head = p2.x === x && p2.y === y;
            let isP1Body = p1.body.some(s => s.x === x && s.y === y);
            let isP2Body = p2.body.some(s => s.x === x && s.y === y);
            let bit = bits.find(b => b.x === x && b.y === y);

            let cellClass = "w-full h-full border border-slate-800/50 flex items-center justify-center font-bold text-sm sm:text-base ";
            let content = "";

            if (isP1Head) {
              cellClass += "bg-blue-400 rounded-sm shadow-[0_0_10px_rgba(96,165,250,0.8)] z-10";
            } else if (isP1Body) {
              cellClass += "bg-blue-600/80 rounded-sm";
            } else if (isP2Head) {
              cellClass += "bg-red-400 rounded-sm shadow-[0_0_10px_rgba(248,113,113,0.8)] z-10";
            } else if (isP2Body) {
              cellClass += "bg-red-600/80 rounded-sm";
            } else if (bit) {
              content = bit.val;
              cellClass += bit.val === 1 ? "text-emerald-400 bg-emerald-900/40" : "text-amber-400 bg-amber-900/40";
            } else {
              cellClass += "bg-slate-900";
            }

            cells.push(<div key={`${x}-${y}`} className={cellClass}>{content}</div>);
          }
        }
        return cells;
      };

      const renderCollected = (collected, targetSeq) => {
        return (
          <div className="flex gap-1 mt-2">
            {targetSeq?.map((val, i) => {
              const hasCollected = i < collected.length;
              const isCorrect = hasCollected && collected[i] === val;
              return (
                <div key={i} className={`w-6 h-8 sm:w-8 sm:h-10 border-2 flex items-center justify-center font-bold rounded ${
                  hasCollected 
                    ? (isCorrect ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-red-500/20 border-red-500 text-red-400')
                    : 'bg-slate-800 border-slate-600 text-slate-500'
                }`}>
                  {hasCollected ? collected[i] : '?'}
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="min-h-screen h-screen overflow-y-auto bg-slate-950 text-slate-100 font-sans flex flex-col items-center py-4 px-2 select-none">
          <header className="w-full max-w-4xl flex justify-between items-center mb-4 px-4">
            <div className="flex items-center gap-2 text-blue-400">
              <CpuIcon size={24} />
              <h1 className="text-xl sm:text-2xl font-black tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-red-400">
                雙核大戰：位元爭奪
              </h1>
            </div>
            <button onClick={() => setShowHelp(true)} className="p-2 text-slate-400 hover:text-white transition bg-slate-800 rounded-full">
              <InfoIcon size={20} />
            </button>
          </header>

          {gameState === 'menu' && (
            <div className="flex-1 flex flex-col items-center justify-center max-w-lg text-center p-6 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl mt-10">
              <GamepadIcon size={64} className="text-emerald-400 mb-6 mx-auto" />
              <h2 className="text-3xl font-bold mb-4">電腦科學雙人競技</h2>
              <p className="text-slate-400 mb-8 leading-relaxed">
                這是一場運算速度的對決！<br/>
                控制你的核心，在資料海中收集正確的 0 和 1，<br/>
                解開二進制、邏輯閘與十六進制的謎題。
              </p>
              <div className="flex flex-col sm:flex-row gap-4 mb-8 text-left w-full bg-slate-950 p-4 rounded-xl border border-slate-800">
                <div className="flex-1">
                  <span className="text-blue-400 font-bold block mb-2">🔵 核心一號 (P1)</span>
                  <kbd className="bg-slate-800 px-2 py-1 rounded">W</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">A</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">S</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">D</kbd> 移動
                </div>
                <div className="flex-1">
                  <span className="text-red-400 font-bold block mb-2">🔴 核心二號 (P2)</span>
                  <kbd className="bg-slate-800 px-2 py-1 rounded">↑</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">←</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">↓</kbd> <kbd className="bg-slate-800 px-2 py-1 rounded">→</kbd> 移動
                </div>
              </div>
              <button 
                onClick={initGame}
                className="w-full py-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 rounded-xl font-bold text-xl shadow-[0_0_20px_rgba(59,130,246,0.5)] transition-all"
              >
                開始對決
              </button>
            </div>
          )}

          {gameState === 'playing' && (
            <div className="w-full max-w-4xl flex flex-col md:flex-row gap-4 items-center md:items-start justify-center">
              
              <div className="w-full md:w-64 flex flex-row md:flex-col justify-between gap-4 order-2 md:order-1">
                <div className="bg-slate-900 border-2 border-blue-900/50 rounded-xl p-4 flex-1">
                  <h3 className="text-blue-400 font-bold text-lg mb-1 flex justify-between">
                    <span>P1 藍核心</span>
                    <span className="text-2xl">{renderState.p1.score}</span>
                  </h3>
                  <p className="text-xs text-slate-400 mb-2">已收集字節:</p>
                  {renderCollected(renderState.p1.collected, renderState.target?.sequence)}
                </div>

                <div className="bg-slate-800 border border-slate-600 rounded-xl p-4 flex-1 md:mt-4 text-center order-first md:order-none w-full md:w-auto mb-4 md:mb-0">
                  <span className="inline-block px-3 py-1 bg-emerald-900/50 text-emerald-400 rounded-full text-xs font-bold mb-2">
                    Level {renderState.target?.level}: {renderState.target?.title}
                  </span>
                  <div className="text-slate-400 text-sm mb-1">當前目標任務</div>
                  <div className="text-xl sm:text-2xl font-black tracking-widest text-white bg-slate-950 py-3 rounded-lg border border-slate-700 shadow-inner whitespace-pre-wrap">
                    {renderState.target?.display}
                  </div>
                  <div className="text-xs text-slate-500 mt-2">目標長度: {renderState.target?.sequence.length} bits</div>
                </div>
              </div>

              <div className="order-1 md:order-2">
                <div 
                  className="bg-slate-900 border-4 border-slate-700 rounded-lg shadow-2xl relative"
                  style={{
                    display: 'grid',
                    gridTemplateColumns: `repeat(${GRID_SIZE}, minmax(0, 1fr))`,
                    gridTemplateRows: `repeat(${GRID_SIZE}, minmax(0, 1fr))`,
                    width: 'min(90vw, 500px)',
                    height: 'min(90vw, 500px)',
                  }}
                >
                  {renderGrid()}
                </div>
              </div>

              <div className="w-full md:w-64 flex flex-row md:flex-col justify-between gap-4 order-3">
                 <div className="bg-slate-900 border-2 border-red-900/50 rounded-xl p-4 flex-1">
                  <h3 className="text-red-400 font-bold text-lg mb-1 flex justify-between">
                    <span>P2 紅核心</span>
                    <span className="text-2xl">{renderState.p2.score}</span>
                  </h3>
                  <p className="text-xs text-slate-400 mb-2">已收集字節:</p>
                  {renderCollected(renderState.p2.collected, renderState.target?.sequence)}
                </div>
              </div>
            </div>
          )}

          {gameState === 'gameover' && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
              <div className="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-md w-full text-center shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                <TrophyIcon size={80} className={`mx-auto mb-6 ${winner.includes('藍') ? 'text-blue-400' : 'text-red-400'}`} />
                <h2 className="text-4xl font-black mb-2 text-white">任務完成</h2>
                <p className="text-2xl font-bold mb-8">
                  獲勝者: <span className={winner.includes('藍') ? 'text-blue-400' : 'text-red-400'}>{winner}</span>
                </p>
                
                <div className="flex justify-between text-lg bg-slate-800 p-4 rounded-xl mb-8 border border-slate-700">
                  <span className="text-blue-400 font-bold">藍方得分: {renderState.p1.score}</span>
                  <span className="text-red-400 font-bold">紅方得分: {renderState.p2.score}</span>
                </div>

                <button 
                  onClick={initGame}
                  className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-xl flex items-center justify-center gap-2 transition-colors"
                >
                  <RefreshIcon size={24} />
                  再戰一局
                </button>
              </div>
            </div>
          )}

          {showHelp && (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
              <div className="bg-slate-800 border border-slate-600 rounded-xl p-6 max-w-md w-full shadow-2xl relative">
                <button onClick={() => setShowHelp(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white text-xl">✕</button>
                <h2 className="text-2xl font-bold mb-4 border-b border-slate-700 pb-2 flex items-center gap-2">
                  <InfoIcon size={24} className="text-blue-400"/> 玩法說明
                </h2>
                <div className="space-y-4 text-slate-300 text-sm">
                  <p>雙方互相競爭，搶先收集地圖上的 <span className="text-emerald-400 font-bold">1</span> 和 <span className="text-amber-400 font-bold">0</span>。</p>
                  
                  <div className="bg-slate-900 p-3 rounded border border-slate-700">
                    <h4 className="font-bold text-white mb-1">🎯 核心規則：</h4>
                    <ul className="list-disc pl-5 space-y-1">
                      <li>觀察中央的「目標任務」。</li>
                      <li>按照任務計算出的**結果順序**，依序吃掉對應的數字。</li>
                      <li>吃錯數字，目前收集進度會清空！</li>
                      <li>率先完成任務者得 1 分，先拿 10 分者贏得比賽。</li>
                    </ul>
                  </div>

                  <div className="bg-slate-900 p-3 rounded border border-slate-700">
                    <h4 className="font-bold text-white mb-1">⚔️ 競技要素：</h4>
                    <ul className="list-disc pl-5 space-y-1">
                      <li>撞到牆壁 或 撞到對手身體，會直接死掉並在角落重生。</li>
                      <li>死亡會掉落所有目前收集到的進度！</li>
                    </ul>
                  </div>

                  <div className="bg-slate-900 p-3 rounded border border-slate-700">
                    <h4 className="font-bold text-white mb-1">📈 難度梯度：</h4>
                    <p className="text-xs text-slate-400 mb-1">隨著雙方最高分增加，題目會升級：</p>
                    <ul className="space-y-1 text-xs">
                      <li><span className="text-emerald-400">Lv 1:</span> 直接讀取 (例: 1010)</li>
                      <li><span className="text-blue-400">Lv 2:</span> 邏輯閘運算 (例: 1100 AND 1010 = 1000)</li>
                      <li><span className="text-purple-400">Lv 3:</span> 16進制轉換 (例: Hex: A = 1010)</li>
                      <li><span className="text-red-400">Lv 4:</span> 反轉運算 (例: NOT 0101 = 1010)</li>
                    </ul>
                  </div>
                </div>
                <button onClick={() => setShowHelp(false)} className="mt-6 w-full py-3 bg-blue-600 hover:bg-blue-500 rounded font-bold transition-colors text-white">
                  我準備好了
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
